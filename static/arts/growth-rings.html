<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>年轮 / Growth Rings</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<style>
  * { margin: 0; padding: 0; }
  body { background: #1a1410; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script>
// === CONFIG ===
const CONFIG = {
  totalRings: 55,
  breathAmp: 3.5,        // how much rings expand/contract
  breathSpeed: 0.008,    // breathing tempo
  fishCount: 3,
  fishSize: 22,
  bgColor: [26, 20, 16],
  heartwood: [28, 18, 10],
  sapwood: [210, 185, 145],
  scarColor: [45, 25, 12],
  resinColor: [160, 110, 50],
  fishColor: [230, 200, 140],
};

let rings = [];
let fishes = [];
let W, cx, cy, maxRadius;
let pg; // offscreen buffer for static ring texture

// === NOISE HELPERS ===
function fbm(x, y, octaves = 4) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    val += amp * noise(x * freq, y * freq);
    amp *= 0.5; freq *= 2;
  }
  return val;
}

// === RING DATA ===
function generateRings() {
  rings = [];
  let r = 8;
  for (let i = 0; i < CONFIG.totalRings && r < maxRadius; i++) {
    const growth = 2.5 + random(5);
    const isScar = random() < 0.12;
    const isWide = random() < 0.15;
    const w = isWide ? growth * 1.8 : (isScar ? growth * 0.4 : growth);
    rings.push({
      innerR: r,
      outerR: r + w,
      midR: r + w / 2,
      isScar,
      age: i / CONFIG.totalRings,
      noiseOff: random(100),
      breathPhase: random(TWO_PI), // each ring breathes slightly out of phase
    });
    r += w;
  }
}

// === FISH ===
// Flat illustration koi — inspired by the pond reference
class Fish {
  constructor() {
    this.reset();
  }

  reset() {
    this.size = CONFIG.fishSize * random(0.8, 1.2);
    this.opacity = 0;
    this.age = 0;
    this.phaseOff = random(TWO_PI);

    const outerR = rings[rings.length - 1].outerR;
    const a = random(TWO_PI);
    const r = random(outerR * 0.1, outerR * 0.8);
    this.x = cx + cos(a) * r;
    this.y = cy + sin(a) * r;

    this.heading = random(TWO_PI);
    this.speed = random(0.3, 0.55);
    this.turnSpeed = 0;
    this.turnTarget = 0;
    this.turnTimer = 0;
    this.life = random(600, 1200);

    // Each fish gets a random color scheme
    const schemes = [
      { body: [220, 80, 60], spots: [255, 255, 255], fin: [200, 60, 50] },   // red & white koi
      { body: [30, 30, 30], spots: [255, 255, 255], fin: [50, 50, 50] },      // black koi
      { body: [230, 160, 50], spots: [255, 240, 200], fin: [210, 130, 30] },  // gold koi
      { body: [220, 100, 80], spots: [240, 200, 170], fin: [200, 70, 60] },   // warm red
    ];
    this.colors = random(schemes);
  }

  update(t) {
    this.age++;
    if (this.opacity < 200) this.opacity = min(200, this.opacity + 2.5);

    this.turnTimer--;
    if (this.turnTimer <= 0) {
      this.turnTarget = random(-0.015, 0.015);
      this.turnTimer = floor(random(100, 250));
    }
    this.turnSpeed = lerp(this.turnSpeed, this.turnTarget, 0.04);
    this.heading += this.turnSpeed;

    this.x += cos(this.heading) * this.speed;
    this.y += sin(this.heading) * this.speed;

    // soft boundary
    const d = dist(this.x, this.y, cx, cy);
    const boundary = rings[rings.length - 1].outerR * 0.88;
    if (d > boundary) {
      const toCenter = atan2(cy - this.y, cx - this.x);
      let diff = toCenter - this.heading;
      while (diff > PI) diff -= TWO_PI;
      while (diff < -PI) diff += TWO_PI;
      this.heading += diff * 0.05;
    }

    if (this.age > this.life) {
      this.opacity -= 2;
      if (this.opacity <= 0) this.reset();
    }
  }

  draw(t) {
    const s = this.size;
    const alpha = this.opacity;
    const c = this.colors;
    const tailWag = sin(t * CONFIG.breathSpeed * 6 + this.phaseOff);

    push();
    translate(this.x, this.y);
    rotate(this.heading);
    noStroke();

    // === TAIL — flowing ribbon ===
    const tailAngle = tailWag * 0.5;
    fill(c.fin[0], c.fin[1], c.fin[2], alpha * 0.7);
    push();
    translate(-s * 0.7, 0);
    rotate(tailAngle);
    beginShape();
    vertex(0, 0);
    bezierVertex(-s * 0.3, -s * 0.35, -s * 0.6, -s * 0.5, -s * 0.8, -s * 0.3);
    vertex(-s * 0.5, 0);
    vertex(-s * 0.8, s * 0.3);
    bezierVertex(-s * 0.6, s * 0.5, -s * 0.3, s * 0.35, 0, 0);
    endShape(CLOSE);
    pop();

    // === BODY — simple oval ===
    fill(c.body[0], c.body[1], c.body[2], alpha);
    ellipse(0, 0, s * 1.8, s * 0.9);

    // === SPOTS — random patches ===
    fill(c.spots[0], c.spots[1], c.spots[2], alpha * 0.8);
    ellipse(s * 0.15, -s * 0.05, s * 0.5, s * 0.35);
    ellipse(-s * 0.25, s * 0.08, s * 0.35, s * 0.25);

    // === DORSAL FIN — tiny bump ===
    fill(c.fin[0], c.fin[1], c.fin[2], alpha * 0.5);
    ellipse(s * 0.05, -s * 0.38, s * 0.4, s * 0.2);

    // === PECTORAL FINS — small side fins ===
    const finFlap = sin(t * CONFIG.breathSpeed * 4 + this.phaseOff) * 0.15;
    fill(c.fin[0], c.fin[1], c.fin[2], alpha * 0.4);
    push();
    translate(s * 0.2, s * 0.3);
    rotate(0.4 + finFlap);
    ellipse(0, 0, s * 0.45, s * 0.18);
    pop();
    push();
    translate(s * 0.2, -s * 0.3);
    rotate(-0.4 - finFlap);
    ellipse(0, 0, s * 0.45, s * 0.18);
    pop();

    // === HEAD highlight ===
    fill(c.body[0] + 30, c.body[1] + 30, c.body[2] + 30, alpha * 0.4);
    ellipse(s * 0.55, 0, s * 0.5, s * 0.45);

    // === EYES — big round cute eyes ===
    // white
    fill(255, 255, 255, alpha);
    circle(s * 0.6, -s * 0.1, s * 0.22);
    circle(s * 0.6, s * 0.1, s * 0.22);
    // pupil
    fill(10, 10, 10, alpha);
    circle(s * 0.63, -s * 0.1, s * 0.12);
    circle(s * 0.63, s * 0.1, s * 0.12);
    // highlight
    fill(255, 255, 255, alpha * 0.8);
    circle(s * 0.65, -s * 0.12, s * 0.04);
    circle(s * 0.65, s * 0.08, s * 0.04);

    pop();
  }
}

// === DRAW STATIC RINGS TO BUFFER ===
function drawRingsToBuffer() {
  pg = createGraphics(W, W);
  pg.background(CONFIG.bgColor);
  pg.noStroke();

  const steps = 360;

  for (const ring of rings) {
    for (let s = 0; s < steps; s++) {
      const angle = (s / steps) * TWO_PI;
      const nx = cos(angle) * 3 + ring.noiseOff;
      const ny = sin(angle) * 3 + ring.noiseOff;
      const wobble = fbm(nx, ny) * 8 - 4;

      const innerR = max(0.5, ring.innerR + wobble);
      const outerR = max(0.5, ring.outerR + wobble * 0.8);

      let r, g, b;
      if (ring.isScar) {
        const t2 = 0.3 + fbm(nx * 2, ny * 2) * 0.4;
        r = lerp(CONFIG.scarColor[0], CONFIG.heartwood[0], t2);
        g = lerp(CONFIG.scarColor[1], CONFIG.heartwood[1], t2);
        b = lerp(CONFIG.scarColor[2], CONFIG.heartwood[2], t2);
      } else {
        r = lerp(CONFIG.heartwood[0], CONFIG.sapwood[0], ring.age * 0.85);
        g = lerp(CONFIG.heartwood[1], CONFIG.sapwood[1], ring.age * 0.85);
        b = lerp(CONFIG.heartwood[2], CONFIG.sapwood[2], ring.age * 0.85);
        const hueShift = fbm(nx * 1.5, ny * 1.5) * 15 - 7;
        r = constrain(r + hueShift, 0, 255);
        g = constrain(g + hueShift * 0.7, 0, 255);
      }

      // early/latewood darkening
      const earlyLate = sin(((angle / TWO_PI + ring.age) % 1) * TWO_PI * 3 + ring.noiseOff) * 0.5 + 0.5;
      const darken = earlyLate * 20;
      r = max(0, r - darken);
      g = max(0, g - darken);
      b = max(0, b - darken * 0.5);

      const a1 = angle;
      const a2 = angle + (TWO_PI / steps) * 1.2;

      pg.fill(r, g, b);
      pg.beginShape();
      // inner arc approximation
      pg.vertex(cx + cos(a1) * innerR, cy + sin(a1) * innerR);
      pg.vertex(cx + cos(a2) * innerR, cy + sin(a2) * innerR);
      pg.vertex(cx + cos(a2) * outerR, cy + sin(a2) * outerR);
      pg.vertex(cx + cos(a1) * outerR, cy + sin(a1) * outerR);
      pg.endShape(CLOSE);
    }

    // ring boundary
    pg.noFill();
    pg.stroke(CONFIG.scarColor[0], CONFIG.scarColor[1], CONFIG.scarColor[2], 60);
    pg.strokeWeight(0.5);
    pg.beginShape();
    for (let s = 0; s <= steps; s++) {
      const angle = (s / steps) * TWO_PI;
      const nx = cos(angle) * 3 + ring.noiseOff;
      const ny = sin(angle) * 3 + ring.noiseOff;
      const wobble = fbm(nx, ny) * 8 - 4;
      const pr = ring.outerR + wobble * 0.8;
      pg.vertex(cx + cos(angle) * pr, cy + sin(angle) * pr);
    }
    pg.endShape(CLOSE);
    pg.noStroke();
  }

  // medullary rays
  const numRays = 8 + floor(random(6));
  const outerR = rings[rings.length - 1].outerR;
  pg.noFill();
  for (let i = 0; i < numRays; i++) {
    const angle = (i / numRays) * TWO_PI + random(-0.15, 0.15);
    const len = outerR * random(0.3, 0.95);
    pg.stroke(CONFIG.resinColor[0], CONFIG.resinColor[1], CONFIG.resinColor[2], 20 + random(25));
    pg.strokeWeight(0.5 + random(1));
    pg.beginShape();
    for (let s = 0; s <= 40; s++) {
      const t = s / 40;
      const rr = t * len;
      const w = sin(t * 8 + i) * 0.02;
      pg.vertex(cx + cos(angle + w) * rr, cy + sin(angle + w) * rr);
    }
    pg.endShape();
  }

  // pith
  pg.noStroke();
  for (let r = 10; r > 0; r -= 0.5) {
    const a = map(r, 10, 0, 0, 255);
    pg.fill(CONFIG.scarColor[0], CONFIG.scarColor[1], CONFIG.scarColor[2], a * 0.3);
    pg.circle(cx, cy, r * 2);
  }

  // vignette
  for (let r = W * 0.85; r < W * 1.1; r += 2) {
    const a = map(r, W * 0.85, W * 1.1, 0, 200);
    pg.noFill();
    pg.stroke(CONFIG.bgColor[0], CONFIG.bgColor[1], CONFIG.bgColor[2], a);
    pg.strokeWeight(3);
    pg.circle(cx, cy, r * 2);
  }
}

// === P5 SETUP ===
function setup() {
  W = min(windowWidth, windowHeight, 900);
  cx = W / 2;
  cy = W / 2;
  maxRadius = W * 0.42;

  createCanvas(W, W);
  noiseSeed(42);
  randomSeed(42);

  generateRings();
  drawRingsToBuffer();

  // create fish
  for (let i = 0; i < CONFIG.fishCount; i++) {
    fishes.push(new Fish());
  }
}

// === P5 DRAW (animation loop) ===
function draw() {
  const t = frameCount * CONFIG.breathSpeed;

  // Draw breathing rings by scaling from center
  // Use the static buffer but apply per-pixel radial breathing via slight scale pulse
  background(CONFIG.bgColor);

  // Breathing: subtle scale oscillation
  const breathScale = 1 + sin(t) * 0.006;
  push();
  translate(cx, cy);
  scale(breathScale);
  translate(-cx, -cy);
  image(pg, 0, 0);
  pop();

  // Overlay: ring gap highlights that pulse (the "breathing" glow between rings)
  for (let i = 2; i < rings.length; i += 3) {
    const ring = rings[i];
    const breathOffset = sin(t + ring.breathPhase) * CONFIG.breathAmp;
    const r = ring.midR + breathOffset;
    const alpha = map(sin(t + ring.breathPhase), -1, 1, 0, 18);

    noFill();
    stroke(CONFIG.sapwood[0], CONFIG.sapwood[1], CONFIG.sapwood[2], alpha);
    strokeWeight(ring.outerR - ring.innerR);
    circle(cx, cy, r * 2);
  }

  // Fish
  noStroke();
  for (const fish of fishes) {
    fish.update(t);
    fish.draw(t);
  }
}

function windowResized() {
  W = min(windowWidth, windowHeight, 900);
  cx = W / 2;
  cy = W / 2;
  maxRadius = W * 0.42;
  resizeCanvas(W, W);
  generateRings();
  drawRingsToBuffer();
}
</script>
</body>
</html>
