<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>呼吸 / Breathing</title>
<style>body{margin:0;overflow:hidden;background:#050505}canvas{display:block;width:100vw;height:100vh}</style>
</head><body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=800,H=800;canvas.width=W;canvas.height=H;
let time=0;
function animate(){
  time+=0.008;ctx.fillStyle="#050505";ctx.fillRect(0,0,W,H);
  const cx=W/2,cy=H/2;
  for(let i=0;i<20;i++){
    const phase=i*0.3+time*2,radius=10+i*12+Math.sin(phase)*8,alpha=(1-i/20)*0.4;
    const wx=Math.sin(time+i*0.5)*2,wy=Math.cos(time*0.7+i*0.3)*2;
    ctx.beginPath();ctx.arc(cx+wx,cy+wy,radius,0,Math.PI*2);
    ctx.strokeStyle=i%5===0?`rgba(196,255,0,${alpha})`:`rgba(184,184,184,${alpha*0.5})`;
    ctx.lineWidth=i%5===0?1.5:0.5;ctx.stroke();
  }
  const cp=Math.sin(time*3)*0.5+0.5;
  ctx.beginPath();ctx.arc(cx,cy,2,0,Math.PI*2);ctx.fillStyle=`rgba(196,255,0,${cp})`;ctx.fill();
  requestAnimationFrame(animate);
}
animate();
</script></body></html>
