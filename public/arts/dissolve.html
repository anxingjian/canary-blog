<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dissolve</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a0a0c; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const CONFIG = {
  gridSize: 36,
  cellSize: 0,
  dissolveSpeed: 0.0003,
  driftMax: 180,
  palette: {
    cold: ['#6b7b8d', '#4a5568', '#8599ad', '#3d4f5f'],
    warm: ['#c4813a', '#d4956b', '#e8a855']
  }
};

let W, H, particles, time = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CONFIG.cellSize = Math.min(W, H) * 0.75 / CONFIG.gridSize;
}

function init() {
  resize();
  particles = [];
  const offsetX = (W - CONFIG.gridSize * CONFIG.cellSize) / 2;
  const offsetY = (H - CONFIG.gridSize * CONFIG.cellSize) / 2;

  for (let row = 0; row < CONFIG.gridSize; row++) {
    for (let col = 0; col < CONFIG.gridSize; col++) {
      const homeX = offsetX + col * CONFIG.cellSize + CONFIG.cellSize / 2;
      const homeY = offsetY + row * CONFIG.cellSize + CONFIG.cellSize / 2;

      // distance from center determines dissolve delay
      const cx = CONFIG.gridSize / 2;
      const cy = CONFIG.gridSize / 2;
      const dist = Math.sqrt((col - cx) ** 2 + (row - cy) ** 2);
      const maxDist = Math.sqrt(cx * cx + cy * cy);
      // outer dissolves first, center holds longest
      const delay = (1 - dist / maxDist) * 0.6;

      const angle = Math.random() * Math.PI * 2;
      const warmChance = 0.08 + (dist / maxDist) * 0.25;
      const isWarm = Math.random() < warmChance;
      const pal = isWarm ? CONFIG.palette.warm : CONFIG.palette.cold;
      const color = pal[Math.floor(Math.random() * pal.length)];

      particles.push({
        homeX, homeY,
        x: homeX, y: homeY,
        angle,
        driftDist: CONFIG.driftMax * (0.4 + Math.random() * 0.6),
        delay,
        progress: 0,
        size: CONFIG.cellSize * (0.15 + Math.random() * 0.15),
        color,
        alpha: 1,
        wobblePhase: Math.random() * Math.PI * 2,
        wobbleAmp: 2 + Math.random() * 4
      });
    }
  }
}

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}

function draw() {
  time += CONFIG.dissolveSpeed;

  ctx.fillStyle = 'rgba(10, 10, 12, 0.15)';
  ctx.fillRect(0, 0, W, H);

  // draw faint grid ghost
  const offsetX = (W - CONFIG.gridSize * CONFIG.cellSize) / 2;
  const offsetY = (H - CONFIG.gridSize * CONFIG.cellSize) / 2;
  ctx.strokeStyle = 'rgba(107, 123, 141, 0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= CONFIG.gridSize; i++) {
    const x = offsetX + i * CONFIG.cellSize;
    const y = offsetY + i * CONFIG.cellSize;
    ctx.beginPath(); ctx.moveTo(x, offsetY); ctx.lineTo(x, offsetY + CONFIG.gridSize * CONFIG.cellSize); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(offsetX, y); ctx.lineTo(offsetX + CONFIG.gridSize * CONFIG.cellSize, y); ctx.stroke();
  }

  for (const p of particles) {
    const t = Math.max(0, Math.min(1, (time - p.delay) / 0.4));
    p.progress = easeInOut(t);

    const drift = p.progress * p.driftDist;
    const wobble = Math.sin(time * 8 + p.wobblePhase) * p.wobbleAmp * p.progress;

    p.x = p.homeX + Math.cos(p.angle) * drift + Math.cos(p.wobblePhase + time * 3) * wobble;
    p.y = p.homeY + Math.sin(p.angle) * drift + Math.sin(p.wobblePhase + time * 3) * wobble;

    // fade as they drift
    p.alpha = 1 - p.progress * 0.7;

    // size shrinks slightly
    const size = p.size * (1 - p.progress * 0.4);

    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();

    if (p.progress < 0.3) {
      // still square-ish
      const r = size / 2;
      const round = p.progress / 0.3;
      if (round < 0.5) {
        ctx.rect(p.x - r, p.y - r, size, size);
      } else {
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      }
    } else {
      ctx.arc(p.x, p.y, size / 2, 0, Math.PI * 2);
    }
    ctx.fill();

    // trail for dissolved particles
    if (p.progress > 0.2) {
      ctx.globalAlpha = p.alpha * 0.15;
      ctx.beginPath();
      ctx.arc(
        p.homeX + Math.cos(p.angle) * drift * 0.5,
        p.homeY + Math.sin(p.angle) * drift * 0.5,
        size * 0.3, 0, Math.PI * 2
      );
      ctx.fill();
    }
  }

  ctx.globalAlpha = 1;

  // loop: when fully dissolved, reset
  if (time > 1.2) {
    time = -0.3;
    for (const p of particles) {
      p.angle = Math.random() * Math.PI * 2;
      p.wobblePhase = Math.random() * Math.PI * 2;
    }
  }

  requestAnimationFrame(draw);
}

window.addEventListener('resize', () => { resize(); init(); });
init();
draw();
</script>
</body>
</html>
