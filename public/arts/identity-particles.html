<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>身份的粒子 / Identity Particles</title>
<style>body{margin:0;overflow:hidden;background:#050505;cursor:crosshair}canvas{display:block;width:100vw;height:100vh}</style>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
</head><body>
<canvas id="c"></canvas>
<script>
document.fonts.ready.then(()=>{
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=800,H=800;canvas.width=W;canvas.height=H;
const particles=[];
const tmp=document.createElement('canvas');tmp.width=W;tmp.height=H;const tc=tmp.getContext('2d');
tc.fillStyle='#fff';tc.font="bold 280px 'Instrument Serif',serif";tc.textAlign='center';tc.textBaseline='middle';
tc.fillText('C',W/2,H/2+10);
const id=tc.getImageData(0,0,W,H);
for(let y=0;y<H;y+=5)for(let x=0;x<W;x+=5){
  if(id.data[(y*W+x)*4+3]>128)particles.push({x,y,vx:0,vy:0,targetX:x,targetY:y,size:Math.random()*1.5+0.5,phase:Math.random()*Math.PI*2});
}
let mouseX=W/2,mouseY=H/2,isInside=false,time=0;
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=(e.clientX-r.left)/r.width*W;mouseY=(e.clientY-r.top)/r.height*H;});
canvas.addEventListener('mouseenter',()=>isInside=true);canvas.addEventListener('mouseleave',()=>isInside=false);
function animate(){
  time+=0.01;ctx.fillStyle="rgba(5,5,5,0.15)";ctx.fillRect(0,0,W,H);
  for(const p of particles){
    const dx=p.targetX-p.x,dy=p.targetY-p.y;p.vx+=dx*0.02;p.vy+=dy*0.02;
    if(isInside){const mx=p.x-mouseX,my=p.y-mouseY,d=Math.sqrt(mx*mx+my*my);
      if(d<80){const f=(80-d)/80;p.vx+=(mx/d)*f*3;p.vy+=(my/d)*f*3;}}
    p.vx+=Math.sin(time+p.phase)*0.1;p.vy+=Math.cos(time*0.7+p.phase)*0.1;
    p.vx*=0.92;p.vy*=0.92;p.x+=p.vx;p.y+=p.vy;
    const b=Math.sin(time*2+p.phase)*0.3+0.7,dt=Math.sqrt(dx*dx+dy*dy),sc=dt>20;
    ctx.fillStyle=sc?`rgba(196,255,0,${b})`:`rgba(200,200,200,${b*0.9})`;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  }
  requestAnimationFrame(animate);
}
animate();
});
</script></body></html>
