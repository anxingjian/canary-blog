<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>微移 / Micro Shift</title>
<style>body{margin:0;overflow:hidden;background:#0c0c0f}</style>
</head><body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();window.onresize=resize;

const CONFIG={
  cols:24,
  rows:16,
  baseColor:[180,175,165],
  accentColor:[210,185,140],
  bgColor:[12,12,15],
  maxDisplace:6,
  noiseScale:0.008,
  timeScale:0.0003,
  lineAlpha:0.35,
  dotAlpha:0.7,
  dotRadius:1.8,
  breathCycle:0.0005
};

// Simple value noise
const P=new Uint8Array(512);
for(let i=0;i<256;i++)P[i]=i;
for(let i=255;i>0;i--){const j=Math.random()*i|0;[P[i],P[j]]=[P[j],P[i]]}
for(let i=0;i<256;i++)P[i+256]=P[i];

function fade(t){return t*t*t*(t*(t*6-15)+10)}
function lerp(a,b,t){return a+t*(b-a)}
function grad(h,x,y){const v=h&3;return(v===0?x+y:v===1?-x+y:v===2?x-y:-x-y)}
function noise2d(x,y){
  const xi=Math.floor(x)&255,yi=Math.floor(y)&255;
  const xf=x-Math.floor(x),yf=y-Math.floor(y);
  const u=fade(xf),v=fade(yf);
  const aa=P[P[xi]+yi],ab=P[P[xi]+yi+1],ba=P[P[xi+1]+yi],bb=P[P[xi+1]+yi+1];
  return lerp(lerp(grad(aa,xf,yf),grad(ba,xf-1,yf),u),lerp(grad(ab,xf,yf-1),grad(bb,xf-1,yf-1),u),v);
}

function fbm(x,y,octaves){
  let val=0,amp=1,freq=1,max=0;
  for(let i=0;i<octaves;i++){val+=noise2d(x*freq,y*freq)*amp;max+=amp;amp*=0.5;freq*=2}
  return val/max;
}

let time=0;

function draw(){
  time++;
  ctx.fillStyle=`rgb(${CONFIG.bgColor.join(',')})`;
  ctx.fillRect(0,0,W,H);

  const cellW=W/(CONFIG.cols-1);
  const cellH=H/(CONFIG.rows-1);
  const marginX=cellW*1.5;
  const marginY=cellH*1.5;
  const innerW=W-marginX*2;
  const innerH=H-marginY*2;

  const t=time*CONFIG.timeScale;
  const breath=Math.sin(time*CONFIG.breathCycle)*0.5+0.5;

  // Compute displaced grid points
  const pts=[];
  for(let r=0;r<CONFIG.rows;r++){
    pts[r]=[];
    for(let c=0;c<CONFIG.cols;c++){
      const baseX=marginX+c/(CONFIG.cols-1)*innerW;
      const baseY=marginY+r/(CONFIG.rows-1)*innerH;
      const n=fbm(c*CONFIG.noiseScale*50+t,r*CONFIG.noiseScale*50+t*0.7,3);
      const n2=fbm(c*CONFIG.noiseScale*50+t*0.5+100,r*CONFIG.noiseScale*50+t*0.3+100,3);
      const displace=CONFIG.maxDisplace*(0.6+breath*0.4);
      pts[r][c]={
        x:baseX+n*displace,
        y:baseY+n2*displace,
        n:Math.abs(n)
      };
    }
  }

  // Draw horizontal lines
  for(let r=0;r<CONFIG.rows;r++){
    ctx.beginPath();
    for(let c=0;c<CONFIG.cols;c++){
      const p=pts[r][c];
      if(c===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);
    }
    const rowAlpha=CONFIG.lineAlpha*(0.3+0.7*Math.sin(r/CONFIG.rows*Math.PI));
    ctx.strokeStyle=`rgba(${CONFIG.baseColor.join(',')},${rowAlpha})`;
    ctx.lineWidth=0.5;
    ctx.stroke();
  }

  // Draw vertical lines
  for(let c=0;c<CONFIG.cols;c++){
    ctx.beginPath();
    for(let r=0;r<CONFIG.rows;r++){
      const p=pts[r][c];
      if(r===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);
    }
    const colAlpha=CONFIG.lineAlpha*(0.3+0.7*Math.sin(c/CONFIG.cols*Math.PI));
    ctx.strokeStyle=`rgba(${CONFIG.baseColor.join(',')},${colAlpha})`;
    ctx.lineWidth=0.5;
    ctx.stroke();
  }

  // Draw intersection dots — accent on high-displacement nodes
  for(let r=0;r<CONFIG.rows;r++){
    for(let c=0;c<CONFIG.cols;c++){
      const p=pts[r][c];
      const intensity=p.n;
      const isAccent=intensity>0.35;
      const col=isAccent?CONFIG.accentColor:CONFIG.baseColor;
      const alpha=isAccent?CONFIG.dotAlpha:CONFIG.dotAlpha*0.4;
      const radius=isAccent?CONFIG.dotRadius*1.3:CONFIG.dotRadius*0.7;

      ctx.beginPath();
      ctx.arc(p.x,p.y,radius,0,Math.PI*2);
      ctx.fillStyle=`rgba(${col.join(',')},${alpha})`;
      ctx.fill();
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body></html>
