<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>萌芽 / Sprout — Growth #1</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a0a0a; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// L-system
const axiom = 'X';
const rules = { X: 'F+[[X]-X]-F[-FX]+X', F: 'FF' };
let sentence = axiom;
const iterations = 6;

for (let i = 0; i < iterations; i++) {
  let next = '';
  for (const c of sentence) next += rules[c] || c;
  sentence = next;
}

// Animation state
let drawIndex = 0;
const speed = 40; // chars per frame
const angle = 25 * Math.PI / 180;
const startLen = 3.5;

// Colors — earthy greens and browns
const palette = [
  'rgba(76, 120, 60, 0.7)',
  'rgba(90, 140, 55, 0.6)',
  'rgba(60, 95, 45, 0.8)',
  'rgba(110, 160, 70, 0.5)',
  'rgba(80, 100, 50, 0.6)',
];

function draw() {
  ctx.fillStyle = 'rgba(10, 10, 10, 0.02)';
  ctx.fillRect(0, 0, W, H);

  const stack = [];
  let x = W * 0.5;
  let y = H * 0.92;
  let a = -Math.PI / 2;
  let len = startLen;
  let depth = 0;
  const maxDraw = Math.min(drawIndex, sentence.length);

  for (let i = 0; i < maxDraw; i++) {
    const c = sentence[i];
    if (c === 'F') {
      const nx = x + len * Math.cos(a);
      const ny = y + len * Math.sin(a);
      const thickness = Math.max(0.3, 3 - depth * 0.15);
      const color = palette[depth % palette.length];
      
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(nx, ny);
      ctx.strokeStyle = color;
      ctx.lineWidth = thickness;
      ctx.lineCap = 'round';
      ctx.stroke();
      
      x = nx;
      y = ny;
    } else if (c === '+') {
      a += angle + (Math.random() - 0.5) * 0.08;
    } else if (c === '-') {
      a -= angle + (Math.random() - 0.5) * 0.08;
    } else if (c === '[') {
      stack.push({ x, y, a, len, depth });
      depth++;
      len *= 0.72;
    } else if (c === ']') {
      const s = stack.pop();
      if (s) {
        x = s.x; y = s.y; a = s.a; len = s.len; depth = s.depth;
      }
    }
  }

  // Draw tiny buds at branch tips when near completion
  if (drawIndex > sentence.length * 0.85) {
    // Reset and find tips
    const tipStack = [];
    let tx = W * 0.5, ty = H * 0.92, ta = -Math.PI / 2, tlen = startLen, td = 0;
    for (let i = 0; i < maxDraw; i++) {
      const c = sentence[i];
      if (c === 'F') {
        tx += tlen * Math.cos(ta);
        ty += tlen * Math.sin(ta);
      } else if (c === '+') { ta += angle; }
      else if (c === '-') { ta -= angle; }
      else if (c === '[') {
        tipStack.push({ x: tx, y: ty, a: ta, len: tlen, depth: td });
        td++; tlen *= 0.72;
      } else if (c === ']') {
        const s = tipStack.pop();
        if (s) { tx = s.x; ty = s.y; ta = s.a; tlen = s.len; td = s.depth; }
      }
    }
  }

  if (drawIndex < sentence.length + 100) {
    drawIndex += speed;
    requestAnimationFrame(draw);
  }
}

// Initial clear
ctx.fillStyle = '#0a0a0a';
ctx.fillRect(0, 0, W, H);

draw();
</script>
</body>
</html>
