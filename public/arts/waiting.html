<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>等待 / Waiting</title>
<style>body{margin:0;overflow:hidden;background:#0a0a0a}</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>
</head><body>
<script>
const el=document.body,W=window.innerWidth,H=window.innerHeight;
const scene=new THREE.Scene();scene.background=new THREE.Color(0x0a0a0a);
const camera=new THREE.PerspectiveCamera(60,W/H,0.1,100);camera.position.z=5;
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
el.appendChild(renderer.domElement);

const TRAIL_LEN=200,trailPositions=new Float32Array(TRAIL_LEN*3),trailOpacities=new Float32Array(TRAIL_LEN);
const trailGeom=new THREE.BufferGeometry();
trailGeom.setAttribute('position',new THREE.BufferAttribute(trailPositions,3));
trailGeom.setAttribute('opacity',new THREE.BufferAttribute(trailOpacities,1));
const trailMat=new THREE.ShaderMaterial({transparent:true,
  vertexShader:`attribute float opacity;varying float vO;void main(){vO=opacity;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);gl_PointSize=1.5;}`,
  fragmentShader:`varying float vO;void main(){gl_FragColor=vec4(1.0,0.95,0.85,vO*0.4);}`});
scene.add(new THREE.Points(trailGeom,trailMat));

const gc=document.createElement('canvas');gc.width=128;gc.height=128;const gx=gc.getContext('2d');
const grad=gx.createRadialGradient(64,64,0,64,64,64);
grad.addColorStop(0,'rgba(255,245,230,1)');grad.addColorStop(0.15,'rgba(255,240,210,0.6)');grad.addColorStop(0.4,'rgba(255,230,190,0.15)');grad.addColorStop(1,'rgba(255,220,170,0)');
gx.fillStyle=grad;gx.fillRect(0,0,128,128);
const core=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(gc),transparent:true,blending:THREE.AdditiveBlending}));
core.scale.set(1.2,1.2,1);scene.add(core);

const DC=80,dp=new Float32Array(DC*3),ds=[];
for(let i=0;i<DC;i++){dp[i*3]=(Math.random()-0.5)*10;dp[i*3+1]=(Math.random()-0.5)*10;dp[i*3+2]=(Math.random()-0.5)*6;ds.push(0.001+Math.random()*0.003);}
const dg=new THREE.BufferGeometry();dg.setAttribute('position',new THREE.BufferAttribute(dp,3));
scene.add(new THREE.Points(dg,new THREE.PointsMaterial({color:0xfff5e6,size:0.03,transparent:true,opacity:0.25,blending:THREE.AdditiveBlending})));

const mouse={x:0,y:0,active:false};
el.addEventListener('mousemove',e=>{mouse.x=(e.clientX/W)*2-1;mouse.y=-(e.clientY/H)*2+1;mouse.active=true;});
el.addEventListener('mouseleave',()=>mouse.active=false);

let px=0,py=0,vx=0.003,vy=0.002,trailIdx=0;
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);const t=clock.getElapsedTime();
  const tx=Math.sin(t*0.23)*1.5+Math.cos(t*0.17)*0.5,ty=Math.cos(t*0.19)*1.2+Math.sin(t*0.31)*0.3;
  if(mouse.active){const mx=mouse.x*3,my=mouse.y*3,dx=mx-px,dy=my-py;if(Math.sqrt(dx*dx+dy*dy)<3){vx+=dx*0.0003;vy+=dy*0.0003;}}
  vx+=(tx-px)*0.002;vy+=(ty-py)*0.002;vx*=0.98;vy*=0.98;px+=vx;py+=vy;
  const br=1.0+Math.sin(t*0.8)*0.15+Math.sin(t*1.7)*0.05;
  core.scale.set(1.2*br,1.2*br,1);core.material.opacity=0.6+Math.sin(t*0.5)*0.2;core.position.set(px,py,0);
  const ti=(trailIdx%TRAIL_LEN)*3;trailPositions[ti]=px;trailPositions[ti+1]=py;trailPositions[ti+2]=0;trailIdx++;
  for(let i=0;i<TRAIL_LEN;i++){const age=(trailIdx-i+TRAIL_LEN)%TRAIL_LEN;trailOpacities[i]=Math.max(0,1-age/TRAIL_LEN);}
  trailGeom.attributes.position.needsUpdate=true;trailGeom.attributes.opacity.needsUpdate=true;
  for(let i=0;i<DC;i++){dp[i*3+1]+=ds[i]*Math.sin(t+i);dp[i*3]+=ds[i]*0.5*Math.cos(t*0.7+i*0.5);
    if(dp[i*3+1]>5)dp[i*3+1]=-5;if(dp[i*3]>5)dp[i*3]=-5;if(dp[i*3]<-5)dp[i*3]=5;}
  dg.attributes.position.needsUpdate=true;
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{const w=innerWidth,h=innerHeight;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);});
</script></body></html>
