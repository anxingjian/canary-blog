<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>墨韵 / Ink Resonance</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #f5f0e8; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// rice paper texture
ctx.fillStyle = '#f5f0e8';
ctx.fillRect(0, 0, W, H);
for (let i = 0; i < W * H * 0.03; i++) {
  const x = Math.random() * W;
  const y = Math.random() * H;
  const a = Math.random() * 0.04;
  ctx.fillStyle = `rgba(180,170,150,${a})`;
  ctx.fillRect(x, y, 1, 1);
}

class InkDrop {
  constructor(x, y, size, darkness) {
    this.particles = [];
    const count = size * 40;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * size * 0.6 + 0.2;
      const life = Math.random() * 120 + 60;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * speed * (0.3 + Math.random() * 0.7),
        vy: Math.sin(angle) * speed * (0.3 + Math.random() * 0.7),
        life,
        maxLife: life,
        size: Math.random() * 2.5 + 0.5,
        darkness: darkness * (0.5 + Math.random() * 0.5),
        drag: 0.94 + Math.random() * 0.04,
        wanderAngle: Math.random() * Math.PI * 2,
        wanderSpeed: Math.random() * 0.3,
      });
    }
  }

  update() {
    let alive = false;
    for (const p of this.particles) {
      if (p.life <= 0) continue;
      alive = true;
      p.wanderAngle += (Math.random() - 0.5) * 0.8;
      p.vx += Math.cos(p.wanderAngle) * p.wanderSpeed;
      p.vy += Math.sin(p.wanderAngle) * p.wanderSpeed;
      p.vx *= p.drag;
      p.vy *= p.drag;
      p.x += p.vx;
      p.y += p.vy;
      p.life--;

      const lifeRatio = p.life / p.maxLife;
      const alpha = p.darkness * lifeRatio * 0.15;
      const r = 30 + Math.random() * 15;
      const g = 25 + Math.random() * 10;
      const b = 20 + Math.random() * 10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (0.5 + lifeRatio * 0.5), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},${alpha})`;
      ctx.fill();
    }
    return alive;
  }
}

// composition: bamboo-like vertical strokes + scattered drops
const drops = [];

// main vertical strokes (like bamboo segments)
const stems = 3 + Math.floor(Math.random() * 3);
for (let s = 0; s < stems; s++) {
  const baseX = W * (0.2 + Math.random() * 0.6);
  const segments = 4 + Math.floor(Math.random() * 5);
  let y = H * (0.7 + Math.random() * 0.2);
  for (let i = 0; i < segments; i++) {
    const darkness = 0.6 + Math.random() * 0.4;
    const size = 1.5 + Math.random() * 2;
    const drift = (Math.random() - 0.5) * 20;
    drops.push(new InkDrop(baseX + drift, y, size, darkness));
    y -= 30 + Math.random() * 50;
  }
  // leaves / branches
  const leafCount = 2 + Math.floor(Math.random() * 4);
  for (let l = 0; l < leafCount; l++) {
    const ly = H * 0.7 - Math.random() * segments * 40;
    const side = Math.random() > 0.5 ? 1 : -1;
    const lx = baseX + side * (20 + Math.random() * 60);
    drops.push(new InkDrop(lx, ly, 1 + Math.random(), 0.4 + Math.random() * 0.3));
  }
}

// accent splashes
for (let i = 0; i < 5; i++) {
  const x = W * (0.1 + Math.random() * 0.8);
  const y = H * (0.1 + Math.random() * 0.8);
  drops.push(new InkDrop(x, y, 0.5 + Math.random() * 0.8, 0.2 + Math.random() * 0.3));
}

let frame = 0;
function animate() {
  let anyAlive = false;
  for (const drop of drops) {
    if (drop.update()) anyAlive = true;
  }
  frame++;
  if (anyAlive && frame < 300) {
    requestAnimationFrame(animate);
  }
}
animate();
</script>
</body>
</html>
