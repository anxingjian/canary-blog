<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>巴别索引 / Babel Index</title>
<style>body{margin:0;overflow:hidden;background:#0a0a0d}</style>
</head><body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();window.onresize=resize;

const CONFIG={
  hexRadius:40,
  charSet:'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789αβγδεζηθικλμνξπρστυφχψω',
  bgColor:'#0a0a0d',
  noiseColor:[140,135,125],
  signalColor:[220,190,120],
  signalGlow:[220,190,120],
  fadeSpeed:0.03,
  searchSpeed:0.0004,
  charSize:9,
  density:0.7
};

// Each hexagonal cell contains random chars; one cell at a time "lights up" as if being indexed
const sqrt3=Math.sqrt(3);
let cells=[];
let searchAngle=0;
let searchX=0,searchY=0;
let found=null,foundTimer=0;

function buildGrid(){
  cells=[];
  const r=CONFIG.hexRadius;
  const dx=r*1.5;
  const dy=r*sqrt3;
  const cols=Math.ceil(W/dx)+2;
  const rows=Math.ceil(H/dy)+2;
  for(let col=-1;col<cols;col++){
    for(let row=-1;row<rows;row++){
      const x=col*dx;
      const y=row*dy+(col%2?dy/2:0);
      // Each cell has random chars
      const chars=[];
      const n=Math.floor(3+Math.random()*8);
      for(let i=0;i<n;i++){
        chars.push({
          ch:CONFIG.charSet[Math.random()*CONFIG.charSet.length|0],
          ox:(Math.random()-0.5)*r*0.6,
          oy:(Math.random()-0.5)*r*0.6,
          alpha:0.05+Math.random()*0.15
        });
      }
      cells.push({x,y,chars,brightness:0,isSignal:Math.random()<0.008});
    }
  }
}
buildGrid();
window.onresize=()=>{resize();buildGrid()};

function drawHex(x,y,r,alpha){
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=Math.PI/3*i-Math.PI/6;
    const px=x+Math.cos(a)*r;
    const py=y+Math.sin(a)*r;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.strokeStyle=`rgba(${CONFIG.noiseColor},${alpha})`;
  ctx.lineWidth=0.5;
  ctx.stroke();
}

function draw(t){
  ctx.fillStyle=CONFIG.bgColor;
  ctx.fillRect(0,0,W,H);

  // Search beam spirals slowly
  searchAngle+=CONFIG.searchSpeed;
  const spiralR=150+Math.sin(t*0.0001)*100;
  searchX=W/2+Math.cos(searchAngle)*spiralR+Math.sin(searchAngle*0.3)*200;
  searchY=H/2+Math.sin(searchAngle)*spiralR+Math.cos(searchAngle*0.7)*150;

  // Draw subtle search beam
  const grad=ctx.createRadialGradient(searchX,searchY,0,searchX,searchY,CONFIG.hexRadius*3);
  grad.addColorStop(0,`rgba(${CONFIG.signalGlow},0.06)`);
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  ctx.font=`${CONFIG.charSize}px monospace`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  for(const cell of cells){
    const dist=Math.hypot(cell.x-searchX,cell.y-searchY);
    const inBeam=dist<CONFIG.hexRadius*2.5;

    // Brightness decay/rise
    if(inBeam){
      cell.brightness=Math.min(1,cell.brightness+0.08);
    }else{
      cell.brightness=Math.max(0,cell.brightness-CONFIG.fadeSpeed);
    }

    const b=cell.brightness;
    const hexAlpha=0.06+b*0.15;
    drawHex(cell.x,cell.y,CONFIG.hexRadius,hexAlpha);

    // Draw chars
    for(const ch of cell.chars){
      let alpha=ch.alpha;
      if(cell.isSignal&&b>0.5){
        // Signal cell — glows warm
        const glow=Math.sin(t*0.003+cell.x*0.01)*0.3+0.7;
        const a=alpha+b*0.6*glow;
        ctx.fillStyle=`rgba(${CONFIG.signalColor},${Math.min(1,a)})`;
        // Glow effect
        ctx.shadowColor=`rgba(${CONFIG.signalGlow},${b*0.4})`;
        ctx.shadowBlur=8;
      }else{
        const a=alpha+b*0.25;
        ctx.fillStyle=`rgba(${CONFIG.noiseColor},${Math.min(0.6,a)})`;
        ctx.shadowColor='transparent';
        ctx.shadowBlur=0;
      }
      ctx.fillText(ch.ch,cell.x+ch.ox,cell.y+ch.oy);
    }
    ctx.shadowColor='transparent';
    ctx.shadowBlur=0;
  }

  // Periodic "found" flash — when beam passes over a signal cell
  if(!found){
    for(const cell of cells){
      if(cell.isSignal&&cell.brightness>0.8&&Math.random()<0.01){
        found=cell;foundTimer=0;break;
      }
    }
  }
  if(found){
    foundTimer+=0.016;
    const pulse=Math.sin(foundTimer*8)*0.5+0.5;
    const fadeOut=Math.max(0,1-foundTimer/2);
    const r=CONFIG.hexRadius*1.2;
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=Math.PI/3*i-Math.PI/6;
      ctx.lineTo(found.x+Math.cos(a)*r,found.y+Math.sin(a)*r);
    }
    ctx.closePath();
    ctx.strokeStyle=`rgba(${CONFIG.signalColor},${pulse*fadeOut*0.6})`;
    ctx.lineWidth=1.5;
    ctx.stroke();
    if(foundTimer>2){found=null}
  }

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body></html>
