<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>年轮 / Growth Rings — Growth #5</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { overflow: hidden; background: #0a0908; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, S;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  S = Math.min(W, H);
}
resize();
window.addEventListener('resize', resize);

// Seeded random for deterministic structure
let seed = 32005;
function rand() { seed ^= seed << 13; seed ^= seed >> 17; seed ^= seed << 5; return (seed >>> 0) / 4294967296; }

// Ring data — each ring has a base radius, color, width, growth speed
const NUM_RINGS = 50;
const rings = [];
const maxR = S * 0.44;
const minR = S * 0.015;

// Color palette: warm earth tones
// heartwood (dark amber) → sapwood (pale cream)
function ringHSL(t) {
  const h = 25 + t * 15 + (rand() - 0.5) * 8;
  const s = 35 - t * 15;
  const l = 15 + t * 30;
  return { h, s, l };
}

let rAccum = minR;
for (let i = 0; i < NUM_RINGS; i++) {
  const t = i / NUM_RINGS;
  const isTrauma = rand() < 0.12;
  const baseWidth = isTrauma ? S * 0.002 + rand() * S * 0.003 : S * 0.005 + rand() * S * 0.012;
  rAccum += baseWidth;
  if (rAccum > maxR) break;
  
  const color = ringHSL(t);
  // Each ring has slight phase offset for organic breathing
  const phaseOffset = rand() * Math.PI * 2;
  // Amplitude of breathing — inner rings breathe less
  const breathAmp = (0.3 + t * 0.7) * S * 0.008;
  // Speed varies — trauma rings pulse differently
  const speed = isTrauma ? 0.3 + rand() * 0.2 : 0.5 + rand() * 0.5;
  
  // Distortion shape (polar noise) — precompute control points
  const numPoints = 120;
  const distortions = [];
  for (let p = 0; p < numPoints; p++) {
    distortions.push((rand() - 0.5) * 2);
  }
  
  rings.push({
    radius: rAccum,
    width: baseWidth,
    color,
    trauma: isTrauma,
    t,
    phaseOffset,
    breathAmp,
    speed,
    distortions,
    // Rotation drift — each ring rotates at its own pace
    rotSpeed: (rand() - 0.5) * 0.0003,
    rotOffset: rand() * Math.PI * 2,
    // Opacity pulse
    baseAlpha: isTrauma ? 0.4 + rand() * 0.2 : 0.25 + rand() * 0.35,
  });
}

// Medullary rays — static radial lines
const NUM_RAYS = 16 + Math.floor(rand() * 8);
const rays = [];
for (let i = 0; i < NUM_RAYS; i++) {
  rays.push({
    angle: rand() * Math.PI * 2,
    length: maxR * (0.4 + rand() * 0.6),
    width: 0.3 + rand() * 0.8,
    alpha: 0.03 + rand() * 0.06,
    drift: (rand() - 0.5) * 0.0002,
  });
}

let time = 0;

function draw() {
  time += 0.016;
  
  // Subtle fade instead of full clear — creates trailing ghost effect
  ctx.fillStyle = 'rgba(10, 9, 8, 0.15)';
  ctx.fillRect(0, 0, W, H);
  
  // Draw rays first (behind rings)
  for (const ray of rays) {
    const a = ray.angle + time * ray.drift;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * minR, cy + Math.sin(a) * minR);
    ctx.lineTo(cx + Math.cos(a) * ray.length, cy + Math.sin(a) * ray.length);
    ctx.strokeStyle = `hsla(35, 30%, 60%, ${ray.alpha})`;
    ctx.lineWidth = ray.width;
    ctx.stroke();
  }
  
  // Draw rings
  const numPoints = 120;
  for (const ring of rings) {
    const breathPhase = time * ring.speed + ring.phaseOffset;
    const breath = Math.sin(breathPhase) * ring.breathAmp;
    const rot = time * ring.rotSpeed + ring.rotOffset;
    
    // Alpha pulse — subtle
    const alphaPulse = ring.baseAlpha + Math.sin(breathPhase * 0.7) * 0.08;
    
    ctx.beginPath();
    for (let p = 0; p <= numPoints; p++) {
      const idx = p % numPoints;
      const angle = (p / numPoints) * Math.PI * 2 + rot;
      
      // Organic distortion from precomputed noise
      const d1 = ring.distortions[idx];
      const d2 = ring.distortions[(idx + 1) % numPoints];
      const blend = (p / numPoints) * numPoints - idx;
      const distortion = (d1 * (1 - blend) + d2 * blend) * S * 0.025 * (0.3 + ring.t * 0.7);
      
      const R = ring.radius + distortion + breath;
      const x = cx + Math.cos(angle) * R;
      const y = cy + Math.sin(angle) * R;
      
      if (p === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    
    const { h, s, l } = ring.color;
    ctx.strokeStyle = `hsla(${h}, ${s}%, ${l}%, ${alphaPulse})`;
    ctx.lineWidth = ring.trauma ? ring.width * 0.5 : ring.width * 0.8;
    ctx.stroke();
    
    // Inner glow for non-trauma rings
    if (!ring.trauma && ring.t < 0.7) {
      ctx.strokeStyle = `hsla(${h}, ${s + 10}%, ${l + 15}%, ${alphaPulse * 0.15})`;
      ctx.lineWidth = ring.width * 2.5;
      ctx.stroke();
    }
  }
  
  // Center heartwood — dark, barely visible, pulsing
  const heartBeat = Math.sin(time * 0.3) * S * 0.003;
  const heartR = minR + heartBeat;
  const heartGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, heartR * 3);
  heartGrad.addColorStop(0, 'rgba(40, 25, 10, 0.5)');
  heartGrad.addColorStop(0.5, 'rgba(30, 18, 8, 0.2)');
  heartGrad.addColorStop(1, 'rgba(10, 9, 8, 0)');
  ctx.fillStyle = heartGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, heartR * 3, 0, Math.PI * 2);
  ctx.fill();
  
  requestAnimationFrame(draw);
}

// First frame: clear fully
ctx.fillStyle = '#0a0908';
ctx.fillRect(0, 0, W, H);
draw();
</script>
</body>
</html>
