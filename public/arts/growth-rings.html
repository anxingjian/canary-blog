<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>年轮 / Growth Rings — Growth #5</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { overflow: hidden; background: #0c0a08; height: 100%; }
  svg { display: block; width: 100vw; height: 100vh; }

  .ring {
    fill: none;
    stroke-linecap: round;
    animation: breathe var(--dur) ease-in-out infinite alternate;
    animation-delay: var(--delay);
  }

  @keyframes breathe {
    0% { r: var(--r-lo); opacity: var(--a-lo); }
    100% { r: var(--r-hi); opacity: var(--a-hi); }
  }

  .ray {
    stroke: hsla(35, 25%, 45%, 0.035);
    stroke-width: 0.4;
  }

  #fish-group {
    offset-path: path(var(--swim-path));
    offset-rotate: auto;
    animation: swim var(--swim-dur) linear infinite;
  }

  @keyframes swim {
    from { offset-distance: 0%; }
    to { offset-distance: 100%; }
  }

  .fish-body {
    fill: hsla(35, 50%, 65%, 0.6);
  }
  .fish-tail {
    fill: hsla(30, 45%, 55%, 0.5);
  }
  .fish-eye {
    fill: hsla(25, 20%, 25%, 0.8);
  }
  .fish-fin {
    fill: hsla(35, 40%, 60%, 0.35);
  }

  #fish-group {
    animation: swimPath 45s linear infinite;
    filter: drop-shadow(0 0 3px hsla(35, 50%, 65%, 0.3));
  }
</style>
</head>
<body>
<svg id="svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="cg">
      <stop offset="0%" stop-color="rgba(45,28,12,0.35)"/>
      <stop offset="100%" stop-color="rgba(10,9,8,0)"/>
    </radialGradient>
  </defs>
</svg>

<script>
const svg = document.getElementById('svg');
const NS = 'http://www.w3.org/2000/svg';
const cx = 400, cy = 400;

let seed = 32005;
function rand() { seed ^= seed << 13; seed ^= seed >> 17; seed ^= seed << 5; return (seed >>> 0) / 4294967296; }

// Rays
for (let i = 0; i < 18; i++) {
  const a = rand() * Math.PI * 2;
  const len = 80 + rand() * 280;
  const line = document.createElementNS(NS, 'line');
  line.setAttribute('x1', cx + Math.cos(a) * 8);
  line.setAttribute('y1', cy + Math.sin(a) * 8);
  line.setAttribute('x2', cx + Math.cos(a) * len);
  line.setAttribute('y2', cy + Math.sin(a) * len);
  line.setAttribute('class', 'ray');
  svg.appendChild(line);
}

// Center glow
const glow = document.createElementNS(NS, 'circle');
glow.setAttribute('cx', cx); glow.setAttribute('cy', cy);
glow.setAttribute('r', 35); glow.setAttribute('fill', 'url(#cg)');
svg.appendChild(glow);

// Rings — fewer, more spaced out for fish to swim through
const rings = [];
let rAccum = 18;

for (let i = 0; i < 25; i++) {
  const t = i / 25;
  const isTrauma = rand() < 0.1;
  const gap = isTrauma ? 5 + rand() * 4 : 10 + rand() * 14;
  rAccum += gap;
  if (rAccum > 370) break;

  const h = 25 + t * 15 + (rand() - 0.5) * 8;
  const s = 30 + (1 - t) * 15;
  const l = 18 + t * 28;
  const sw = isTrauma ? 0.3 + rand() * 0.4 : 0.6 + rand() * 1.5;

  // Dash pattern
  const circ = 2 * Math.PI * rAccum;
  let dash;
  if (isTrauma) {
    dash = `${2 + rand() * 4} ${3 + rand() * 5}`;
  } else {
    const d1 = 20 + rand() * 80;
    const g1 = 1.5 + rand() * 3;
    dash = `${d1} ${g1}`;
  }

  // Breathing: radius oscillates ± a few px
  const breathAmp = 1.5 + rand() * 3;
  const rLo = rAccum - breathAmp;
  const rHi = rAccum + breathAmp;
  const aLo = isTrauma ? 0.15 : 0.25 + rand() * 0.15;
  const aHi = isTrauma ? 0.35 : 0.5 + rand() * 0.3;
  const dur = 5 + rand() * 8;
  const delay = rand() * -12;

  const circle = document.createElementNS(NS, 'circle');
  circle.setAttribute('cx', cx);
  circle.setAttribute('cy', cy);
  circle.setAttribute('r', rAccum);
  circle.setAttribute('class', 'ring');
  circle.setAttribute('stroke', `hsl(${h}, ${s}%, ${l}%)`);
  circle.setAttribute('stroke-width', sw);
  circle.setAttribute('stroke-dasharray', dash);
  circle.setAttribute('stroke-dashoffset', rand() * circ);
  circle.style.setProperty('--r-lo', rLo);
  circle.style.setProperty('--r-hi', rHi);
  circle.style.setProperty('--a-lo', aLo);
  circle.style.setProperty('--a-hi', aHi);
  circle.style.setProperty('--dur', dur + 's');
  circle.style.setProperty('--delay', delay + 's');

  svg.appendChild(circle);
  rings.push({ r: rAccum, t });
}

// Fish — small, elegant, hand-drawn feel
// Fish swims in a spiral-ish path weaving between rings
// Build a smooth path that spirals outward then inward
const fishR1 = 50;  // inner orbit
const fishR2 = 300; // outer orbit
const pathPoints = [];
const steps = 360;
for (let i = 0; i <= steps; i++) {
  const progress = i / steps;
  // Spiral out for first half, spiral back in for second half
  const phase = progress < 0.5 ? progress * 2 : 2 - progress * 2;
  const r = fishR1 + (fishR2 - fishR1) * (0.5 - 0.5 * Math.cos(phase * Math.PI));
  // Add gentle wobble to avoid perfect circle
  const wobble = Math.sin(progress * Math.PI * 12) * 15;
  const angle = progress * Math.PI * 4; // 2 full rotations
  const x = cx + Math.cos(angle) * (r + wobble);
  const y = cy + Math.sin(angle) * (r + wobble);
  if (i === 0) pathPoints.push(`M ${x} ${y}`);
  else pathPoints.push(`L ${x} ${y}`);
}
pathPoints.push('Z');
const swimPathD = pathPoints.join(' ');

// Add invisible path for offset-path
const swimPath = document.createElementNS(NS, 'path');
swimPath.setAttribute('id', 'swimPath');
swimPath.setAttribute('d', swimPathD);
swimPath.setAttribute('fill', 'none');
swimPath.setAttribute('stroke', 'none');
svg.appendChild(swimPath);

// Fish SVG group
const fishG = document.createElementNS(NS, 'g');
fishG.setAttribute('id', 'fish-group');

// Fish body — sleek teardrop
const body = document.createElementNS(NS, 'path');
body.setAttribute('d', 'M 0,-2.5 C 4,-2.5 8,-1.5 10,0 C 8,1.5 4,2.5 0,2.5 C -2,1.5 -3,0.8 -3,0 C -3,-0.8 -2,-1.5 0,-2.5 Z');
body.setAttribute('class', 'fish-body');
fishG.appendChild(body);

// Tail
const tail = document.createElementNS(NS, 'path');
tail.setAttribute('d', 'M -3,0 C -5,-1.5 -8,-3.5 -9,-4 C -7,-1 -7,1 -9,4 C -8,3.5 -5,1.5 -3,0 Z');
tail.setAttribute('class', 'fish-tail');
fishG.appendChild(tail);

// Dorsal fin
const fin = document.createElementNS(NS, 'path');
fin.setAttribute('d', 'M 3,-2.5 C 4,-5 6,-5.5 7,-4 C 7,-2.5 6,-2 5,-1.8');
fin.setAttribute('class', 'fish-fin');
fishG.appendChild(fin);

// Eye
const eye = document.createElementNS(NS, 'circle');
eye.setAttribute('cx', 7); eye.setAttribute('cy', -0.5);
eye.setAttribute('r', 0.7);
eye.setAttribute('class', 'fish-eye');
fishG.appendChild(eye);

svg.appendChild(fishG);

// Animate fish along path using JS (offset-path has cross-browser issues with SVG)
const pathEl = document.getElementById('swimPath');
const pathLen = pathEl.getTotalLength();
let fishTime = 0;
const fishSpeed = 0.15; // px per frame-ish

function animateFish() {
  fishTime += fishSpeed;
  if (fishTime > pathLen) fishTime -= pathLen;
  
  const pt = pathEl.getPointAtLength(fishTime);
  const pt2 = pathEl.getPointAtLength((fishTime + 2) % pathLen);
  const angle = Math.atan2(pt2.y - pt.y, pt2.x - pt.x) * 180 / Math.PI;
  
  // Gentle tail wag via slight scale pulse
  const wag = Math.sin(fishTime * 0.05) * 0.05;
  
  fishG.setAttribute('transform', 
    `translate(${pt.x}, ${pt.y}) rotate(${angle}) scale(${1.8 + wag}, ${1.8})`
  );
  
  requestAnimationFrame(animateFish);
}
animateFish();
</script>
</body>
</html>
