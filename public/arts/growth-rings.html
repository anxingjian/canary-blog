<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>年轮 / Growth Rings</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<style>
  * { margin: 0; padding: 0; }
  body { background: #1a1410; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script>
// === CONFIG ===
const CONFIG = {
  totalRings: 55,
  breathAmp: 3.5,        // how much rings expand/contract
  breathSpeed: 0.008,    // breathing tempo
  fishCount: 3,
  fishSize: 14,
  bgColor: [26, 20, 16],
  heartwood: [28, 18, 10],
  sapwood: [210, 185, 145],
  scarColor: [45, 25, 12],
  resinColor: [160, 110, 50],
  fishColor: [230, 200, 140],
};

let rings = [];
let fishes = [];
let W, cx, cy, maxRadius;
let pg; // offscreen buffer for static ring texture

// === NOISE HELPERS ===
function fbm(x, y, octaves = 4) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    val += amp * noise(x * freq, y * freq);
    amp *= 0.5; freq *= 2;
  }
  return val;
}

// === RING DATA ===
function generateRings() {
  rings = [];
  let r = 8;
  for (let i = 0; i < CONFIG.totalRings && r < maxRadius; i++) {
    const growth = 2.5 + random(5);
    const isScar = random() < 0.12;
    const isWide = random() < 0.15;
    const w = isWide ? growth * 1.8 : (isScar ? growth * 0.4 : growth);
    rings.push({
      innerR: r,
      outerR: r + w,
      midR: r + w / 2,
      isScar,
      age: i / CONFIG.totalRings,
      noiseOff: random(100),
      breathPhase: random(TWO_PI), // each ring breathes slightly out of phase
    });
    r += w;
  }
}

// === FISH ===
const FISH_SEGMENTS = 12; // number of body joints

class Fish {
  constructor() {
    this.segments = [];
    this.reset();
  }

  reset() {
    this.size = CONFIG.fishSize * random(0.7, 1.3);
    this.wobbleOff = random(100);
    this.opacity = 0;
    this.fadeIn = true;
    this.age = 0;

    const outerR = rings[rings.length - 1].outerR;
    const startAngle = random(TWO_PI);
    const startR = random(outerR * 0.15, outerR * 0.85);
    const x = cx + cos(startAngle) * startR;
    const y = cy + sin(startAngle) * startR;

    this.heading = random(TWO_PI);
    this.speed = random(0.4, 0.7);
    this.turnSpeed = 0;
    this.turnTarget = 0;
    this.turnTimer = 0;
    this.life = random(500, 900);
    this.tailPhase = random(TWO_PI);
    this.tailFreq = random(5, 7); // tail beat frequency
    this.tailAmp = random(0.35, 0.55); // tail wave amplitude

    // Initialize segments — all stacked at start position
    this.segments = [];
    for (let i = 0; i < FISH_SEGMENTS; i++) {
      this.segments.push({ x, y });
    }
  }

  update(t) {
    this.age++;

    if (this.fadeIn && this.opacity < 180) {
      this.opacity = min(180, this.opacity + 3);
    }

    // Organic turning
    this.turnTimer--;
    if (this.turnTimer <= 0) {
      this.turnTarget = random(-0.025, 0.025);
      this.turnTimer = floor(random(60, 200));
    }
    this.turnSpeed = lerp(this.turnSpeed, this.turnTarget, 0.05);
    this.heading += this.turnSpeed;

    // Move head forward
    const head = this.segments[0];
    head.x += cos(this.heading) * this.speed;
    head.y += sin(this.heading) * this.speed;

    // Each segment follows the one in front — chain IK
    const segSpacing = this.size * 0.45;
    for (let i = 1; i < FISH_SEGMENTS; i++) {
      const prev = this.segments[i - 1];
      const seg = this.segments[i];

      // S-wave: lateral offset increases toward tail
      const wave = sin(t * CONFIG.breathSpeed * this.tailFreq + this.tailPhase + i * 0.7) 
                   * this.tailAmp * this.size * (i / FISH_SEGMENTS);

      const dx = prev.x - seg.x;
      const dy = prev.y - seg.y;
      const angle = atan2(dy, dx);

      // Target position: behind prev segment + lateral wave
      const targetX = prev.x - cos(angle) * segSpacing + cos(angle + HALF_PI) * wave;
      const targetY = prev.y - sin(angle) * segSpacing + sin(angle + HALF_PI) * wave;

      // Smooth follow
      seg.x = lerp(seg.x, targetX, 0.6);
      seg.y = lerp(seg.y, targetY, 0.6);
    }

    // Soft boundary — steer head back when near edges
    const distFromCenter = dist(head.x, head.y, cx, cy);
    const boundary = rings[rings.length - 1].outerR * 0.88;
    if (distFromCenter > boundary) {
      const toCenter = atan2(cy - head.y, cx - head.x);
      let diff = toCenter - this.heading;
      while (diff > PI) diff -= TWO_PI;
      while (diff < -PI) diff += TWO_PI;
      this.heading += diff * 0.06;
    }

    if (this.age > this.life) {
      this.opacity -= 2;
      if (this.opacity <= 0) this.reset();
    }
  }

  draw(frameT) {
    const s = this.size;
    const alpha = this.opacity;
    const segs = this.segments;

    // Body widths — fat in middle, tapers at head and tail
    const widths = [];
    for (let i = 0; i < FISH_SEGMENTS; i++) {
      const t = i / (FISH_SEGMENTS - 1); // 0=head, 1=tail
      // Teardrop: head narrow, widest at ~30%, narrows to tail
      let w;
      if (t < 0.3) {
        w = lerp(0.35, 1.0, t / 0.3);
      } else {
        w = lerp(1.0, 0.08, (t - 0.3) / 0.7);
      }
      widths.push(w * s * 0.55);
    }

    push();
    noStroke();

    // === INK WASH LAYERS ===
    // Outer wash — soft bleed
    this.drawBody(segs, widths, 1.8, color(60, 45, 30, alpha * 0.1));
    // Mid wash
    this.drawBody(segs, widths, 1.3, color(50, 35, 20, alpha * 0.2));
    // Core body
    this.drawBody(segs, widths, 1.0, color(35, 25, 15, alpha * 0.65));

    // Dorsal fin — brushstroke along top of body
    stroke(40, 30, 18, alpha * 0.4);
    strokeWeight(s * 0.06);
    noFill();
    beginShape();
    for (let i = 2; i < 7 && i < FISH_SEGMENTS; i++) {
      const seg = segs[i];
      const prev = segs[i - 1];
      const angle = atan2(seg.y - prev.y, seg.x - prev.x);
      const w = widths[i] * 1.2;
      curveVertex(seg.x + cos(angle - HALF_PI) * w, seg.y + sin(angle - HALF_PI) * w);
    }
    endShape();

    // Tail fin — fan shape at last segments
    noStroke();
    fill(40, 28, 15, alpha * 0.5);
    const tail = segs[FISH_SEGMENTS - 1];
    const preTail = segs[FISH_SEGMENTS - 3];
    const tailAngle = atan2(tail.y - preTail.y, tail.x - preTail.x);
    const tailSpread = sin(frameT * CONFIG.breathSpeed * this.tailFreq + this.tailPhase) * 0.4 + 0.6;
    const fanSize = s * 0.7;
    beginShape();
    vertex(tail.x, tail.y);
    vertex(
      tail.x + cos(tailAngle + tailSpread) * fanSize,
      tail.y + sin(tailAngle + tailSpread) * fanSize
    );
    vertex(
      tail.x + cos(tailAngle) * fanSize * 1.1,
      tail.y + sin(tailAngle) * fanSize * 1.1
    );
    vertex(
      tail.x + cos(tailAngle - tailSpread) * fanSize,
      tail.y + sin(tailAngle - tailSpread) * fanSize
    );
    endShape(CLOSE);

    // Eye
    const head = segs[0];
    const seg1 = segs[1];
    const headAngle = atan2(head.y - seg1.y, head.x - seg1.x);
    const eyeX = head.x + cos(headAngle) * s * 0.15;
    const eyeY = head.y + sin(headAngle) * s * 0.15;
    noStroke();
    fill(20, 15, 10, alpha * 0.9);
    circle(eyeX, eyeY, s * 0.2);
    fill(CONFIG.sapwood[0], CONFIG.sapwood[1], CONFIG.sapwood[2], alpha * 0.3);
    circle(eyeX + cos(headAngle) * s * 0.03, eyeY + sin(headAngle) * s * 0.03, s * 0.06);

    pop();
  }

  drawBody(segs, widths, scale, col) {
    // Draw smooth body outline using segment positions and widths
    const pts = FISH_SEGMENTS;

    fill(col);
    beginShape();
    // Left side (head to tail)
    for (let i = 0; i < pts; i++) {
      const seg = segs[i];
      const next = segs[min(i + 1, pts - 1)];
      const angle = atan2(next.y - seg.y, next.x - seg.x);
      const w = widths[i] * scale;
      curveVertex(seg.x + cos(angle - HALF_PI) * w, seg.y + sin(angle - HALF_PI) * w);
    }
    // Right side (tail to head)
    for (let i = pts - 1; i >= 0; i--) {
      const seg = segs[i];
      const next = segs[min(i + 1, pts - 1)];
      const angle = atan2(next.y - seg.y, next.x - seg.x);
      const w = widths[i] * scale;
      curveVertex(seg.x + cos(angle + HALF_PI) * w, seg.y + sin(angle + HALF_PI) * w);
    }
    endShape(CLOSE);
  }
}

// === DRAW STATIC RINGS TO BUFFER ===
function drawRingsToBuffer() {
  pg = createGraphics(W, W);
  pg.background(CONFIG.bgColor);
  pg.noStroke();

  const steps = 360;

  for (const ring of rings) {
    for (let s = 0; s < steps; s++) {
      const angle = (s / steps) * TWO_PI;
      const nx = cos(angle) * 3 + ring.noiseOff;
      const ny = sin(angle) * 3 + ring.noiseOff;
      const wobble = fbm(nx, ny) * 8 - 4;

      const innerR = max(0.5, ring.innerR + wobble);
      const outerR = max(0.5, ring.outerR + wobble * 0.8);

      let r, g, b;
      if (ring.isScar) {
        const t2 = 0.3 + fbm(nx * 2, ny * 2) * 0.4;
        r = lerp(CONFIG.scarColor[0], CONFIG.heartwood[0], t2);
        g = lerp(CONFIG.scarColor[1], CONFIG.heartwood[1], t2);
        b = lerp(CONFIG.scarColor[2], CONFIG.heartwood[2], t2);
      } else {
        r = lerp(CONFIG.heartwood[0], CONFIG.sapwood[0], ring.age * 0.85);
        g = lerp(CONFIG.heartwood[1], CONFIG.sapwood[1], ring.age * 0.85);
        b = lerp(CONFIG.heartwood[2], CONFIG.sapwood[2], ring.age * 0.85);
        const hueShift = fbm(nx * 1.5, ny * 1.5) * 15 - 7;
        r = constrain(r + hueShift, 0, 255);
        g = constrain(g + hueShift * 0.7, 0, 255);
      }

      // early/latewood darkening
      const earlyLate = sin(((angle / TWO_PI + ring.age) % 1) * TWO_PI * 3 + ring.noiseOff) * 0.5 + 0.5;
      const darken = earlyLate * 20;
      r = max(0, r - darken);
      g = max(0, g - darken);
      b = max(0, b - darken * 0.5);

      const a1 = angle;
      const a2 = angle + (TWO_PI / steps) * 1.2;

      pg.fill(r, g, b);
      pg.beginShape();
      // inner arc approximation
      pg.vertex(cx + cos(a1) * innerR, cy + sin(a1) * innerR);
      pg.vertex(cx + cos(a2) * innerR, cy + sin(a2) * innerR);
      pg.vertex(cx + cos(a2) * outerR, cy + sin(a2) * outerR);
      pg.vertex(cx + cos(a1) * outerR, cy + sin(a1) * outerR);
      pg.endShape(CLOSE);
    }

    // ring boundary
    pg.noFill();
    pg.stroke(CONFIG.scarColor[0], CONFIG.scarColor[1], CONFIG.scarColor[2], 60);
    pg.strokeWeight(0.5);
    pg.beginShape();
    for (let s = 0; s <= steps; s++) {
      const angle = (s / steps) * TWO_PI;
      const nx = cos(angle) * 3 + ring.noiseOff;
      const ny = sin(angle) * 3 + ring.noiseOff;
      const wobble = fbm(nx, ny) * 8 - 4;
      const pr = ring.outerR + wobble * 0.8;
      pg.vertex(cx + cos(angle) * pr, cy + sin(angle) * pr);
    }
    pg.endShape(CLOSE);
    pg.noStroke();
  }

  // medullary rays
  const numRays = 8 + floor(random(6));
  const outerR = rings[rings.length - 1].outerR;
  pg.noFill();
  for (let i = 0; i < numRays; i++) {
    const angle = (i / numRays) * TWO_PI + random(-0.15, 0.15);
    const len = outerR * random(0.3, 0.95);
    pg.stroke(CONFIG.resinColor[0], CONFIG.resinColor[1], CONFIG.resinColor[2], 20 + random(25));
    pg.strokeWeight(0.5 + random(1));
    pg.beginShape();
    for (let s = 0; s <= 40; s++) {
      const t = s / 40;
      const rr = t * len;
      const w = sin(t * 8 + i) * 0.02;
      pg.vertex(cx + cos(angle + w) * rr, cy + sin(angle + w) * rr);
    }
    pg.endShape();
  }

  // pith
  pg.noStroke();
  for (let r = 10; r > 0; r -= 0.5) {
    const a = map(r, 10, 0, 0, 255);
    pg.fill(CONFIG.scarColor[0], CONFIG.scarColor[1], CONFIG.scarColor[2], a * 0.3);
    pg.circle(cx, cy, r * 2);
  }

  // vignette
  for (let r = W * 0.85; r < W * 1.1; r += 2) {
    const a = map(r, W * 0.85, W * 1.1, 0, 200);
    pg.noFill();
    pg.stroke(CONFIG.bgColor[0], CONFIG.bgColor[1], CONFIG.bgColor[2], a);
    pg.strokeWeight(3);
    pg.circle(cx, cy, r * 2);
  }
}

// === P5 SETUP ===
function setup() {
  W = min(windowWidth, windowHeight, 900);
  cx = W / 2;
  cy = W / 2;
  maxRadius = W * 0.42;

  createCanvas(W, W);
  noiseSeed(42);
  randomSeed(42);

  generateRings();
  drawRingsToBuffer();

  // create fish
  for (let i = 0; i < CONFIG.fishCount; i++) {
    fishes.push(new Fish());
  }
}

// === P5 DRAW (animation loop) ===
function draw() {
  const t = frameCount * CONFIG.breathSpeed;

  // Draw breathing rings by scaling from center
  // Use the static buffer but apply per-pixel radial breathing via slight scale pulse
  background(CONFIG.bgColor);

  // Breathing: subtle scale oscillation
  const breathScale = 1 + sin(t) * 0.006;
  push();
  translate(cx, cy);
  scale(breathScale);
  translate(-cx, -cy);
  image(pg, 0, 0);
  pop();

  // Overlay: ring gap highlights that pulse (the "breathing" glow between rings)
  for (let i = 2; i < rings.length; i += 3) {
    const ring = rings[i];
    const breathOffset = sin(t + ring.breathPhase) * CONFIG.breathAmp;
    const r = ring.midR + breathOffset;
    const alpha = map(sin(t + ring.breathPhase), -1, 1, 0, 18);

    noFill();
    stroke(CONFIG.sapwood[0], CONFIG.sapwood[1], CONFIG.sapwood[2], alpha);
    strokeWeight(ring.outerR - ring.innerR);
    circle(cx, cy, r * 2);
  }

  // Fish
  noStroke();
  for (const fish of fishes) {
    fish.update(t);
    fish.draw(t);
  }
}

function windowResized() {
  W = min(windowWidth, windowHeight, 900);
  cx = W / 2;
  cy = W / 2;
  maxRadius = W * 0.42;
  resizeCanvas(W, W);
  generateRings();
  drawRingsToBuffer();
}
</script>
</body>
</html>
