<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>年轮 / Growth Rings — Growth #5</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #1a1410; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width = window.innerWidth;
const H = canvas.height = window.innerHeight;
const S = Math.min(W, H);
const cx = W / 2, cy = H / 2;

let seed = 32005;
function rand() { seed ^= seed << 13; seed ^= seed >> 17; seed ^= seed << 5; return (seed >>> 0) / 4294967296; }

// FBM noise for ring irregularity
function hash(x, y) {
  let h = seed ^ (x * 374761393 + y * 668265263);
  h = (h ^ (h >> 13)) * 1274126177;
  return ((h ^ (h >> 16)) >>> 0) / 4294967296;
}
function noise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
  const a = hash(ix, iy), b = hash(ix + 1, iy);
  const c = hash(ix, iy + 1), d = hash(ix + 1, iy + 1);
  return a + (b - a) * sx + (c - a) * sy + (a - b - c + d) * sx * sy;
}
function fbm(x, y, octaves) {
  let v = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    v += amp * noise(x * freq, y * freq);
    amp *= 0.5; freq *= 2;
  }
  return v;
}

// Background
ctx.fillStyle = '#1a1410';
ctx.fillRect(0, 0, W, H);

// Draw rings
const numRings = 65;
const maxR = S * 0.42;
const minR = S * 0.02;

// Pre-calculate ring radii with variable spacing (good years = wider)
const rings = [];
let r = minR;
for (let i = 0; i < numRings; i++) {
  const isTrauma = rand() < 0.15;
  const width = isTrauma ? S * 0.002 + rand() * S * 0.003 : S * 0.004 + rand() * S * 0.008;
  r += width;
  if (r > maxR) break;
  rings.push({ radius: r, width: width, trauma: isTrauma });
}

// Color: dark heartwood center → lighter sapwood edge
function ringColor(t, trauma) {
  // t: 0 (center) to 1 (edge)
  const h = 25 + t * 10; // warm brown hue
  const s = 25 + t * 10;
  const lBase = trauma ? 12 + t * 8 : 18 + t * 22;
  const l = lBase + (rand() - 0.5) * 3;
  return `hsl(${h}, ${s}%, ${l}%)`;
}

// Draw each ring
const steps = 360;
for (let i = 0; i < rings.length; i++) {
  const ring = rings[i];
  const t = i / rings.length;
  ctx.beginPath();
  for (let a = 0; a <= steps; a++) {
    const angle = (a / steps) * Math.PI * 2;
    const nx = Math.cos(angle) * 3 + i * 0.1;
    const ny = Math.sin(angle) * 3 + i * 0.1;
    const distortion = fbm(nx, ny, 4) * S * 0.04 * (0.5 + t * 0.5);
    const R = ring.radius + distortion;
    const x = cx + Math.cos(angle) * R;
    const y = cy + Math.sin(angle) * R;
    if (a === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.strokeStyle = ringColor(t, ring.trauma);
  ctx.lineWidth = Math.max(0.5, ring.width * 0.6);
  ctx.globalAlpha = 0.6 + rand() * 0.35;
  ctx.stroke();
}

// Heartwood fill (dark center)
ctx.globalAlpha = 0.8;
ctx.beginPath();
for (let a = 0; a <= steps; a++) {
  const angle = (a / steps) * Math.PI * 2;
  const distortion = fbm(Math.cos(angle) * 3, Math.sin(angle) * 3, 4) * S * 0.01;
  const R = minR + distortion;
  const x = cx + Math.cos(angle) * R;
  const y = cy + Math.sin(angle) * R;
  if (a === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
}
ctx.closePath();
ctx.fillStyle = '#1a1008';
ctx.fill();

// Medullary rays — radial lines from center
ctx.globalAlpha = 1;
const numRays = 12 + Math.floor(rand() * 8);
for (let i = 0; i < numRays; i++) {
  const angle = rand() * Math.PI * 2;
  const rayLen = maxR * (0.5 + rand() * 0.5);
  const rayWidth = 0.5 + rand() * 1;

  ctx.beginPath();
  ctx.moveTo(cx + Math.cos(angle) * minR, cy + Math.sin(angle) * minR);

  // Slightly wavy ray
  const segs = 20;
  for (let s = 1; s <= segs; s++) {
    const t = s / segs;
    const r = minR + (rayLen - minR) * t;
    const wobble = (rand() - 0.5) * 0.03;
    const x = cx + Math.cos(angle + wobble) * r;
    const y = cy + Math.sin(angle + wobble) * r;
    ctx.lineTo(x, y);
  }

  ctx.strokeStyle = `hsla(35, 40%, 55%, ${0.08 + rand() * 0.12})`;
  ctx.lineWidth = rayWidth;
  ctx.lineCap = 'round';
  ctx.stroke();
}

// Subtle bark texture at edge
ctx.globalAlpha = 0.15;
for (let i = 0; i < 2000; i++) {
  const angle = rand() * Math.PI * 2;
  const r = maxR + rand() * S * 0.03;
  const x = cx + Math.cos(angle) * r;
  const y = cy + Math.sin(angle) * r;
  ctx.fillStyle = `hsl(${20 + rand() * 15}, ${15 + rand() * 10}%, ${10 + rand() * 8}%)`;
  ctx.fillRect(x, y, 1 + rand() * 2, 1);
}

// Vignette
ctx.globalAlpha = 1;
const vig = ctx.createRadialGradient(cx, cy, S * 0.25, cx, cy, S * 0.7);
vig.addColorStop(0, 'transparent');
vig.addColorStop(1, 'rgba(15, 10, 5, 0.6)');
ctx.fillStyle = vig;
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
