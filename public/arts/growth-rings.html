<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>年轮 / Growth Rings — Growth #5</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { overflow: hidden; background: #0c0a08; height: 100%; }
  svg { display: block; width: 100vw; height: 100vh; }

  .ring {
    fill: none;
    stroke-linecap: round;
  }

  .ring-breathe {
    animation: breathe var(--dur) ease-in-out infinite alternate;
    animation-delay: var(--delay);
  }

  @keyframes breathe {
    0% { opacity: var(--alpha-lo); }
    100% { opacity: var(--alpha-hi); }
  }

  .ray {
    stroke: hsla(35, 25%, 50%, 0.04);
    stroke-width: 0.5;
    stroke-linecap: round;
  }
</style>
</head>
<body>
<svg id="svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="center-glow">
      <stop offset="0%" stop-color="rgba(50,30,12,0.4)"/>
      <stop offset="100%" stop-color="rgba(10,9,8,0)"/>
    </radialGradient>
  </defs>
</svg>

<script>
const svg = document.getElementById('svg');
const NS = 'http://www.w3.org/2000/svg';
const cx = 400, cy = 400;

// Seeded RNG
let seed = 32005;
function rand() { seed ^= seed << 13; seed ^= seed >> 17; seed ^= seed << 5; return (seed >>> 0) / 4294967296; }

// Rays (behind rings)
const numRays = 20;
for (let i = 0; i < numRays; i++) {
  const angle = rand() * Math.PI * 2;
  const len = 100 + rand() * 260;
  const x1 = cx + Math.cos(angle) * 10;
  const y1 = cy + Math.sin(angle) * 10;
  const x2 = cx + Math.cos(angle) * len;
  const y2 = cy + Math.sin(angle) * len;
  const line = document.createElementNS(NS, 'line');
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  line.setAttribute('class', 'ray');
  svg.appendChild(line);
}

// Center glow
const glow = document.createElementNS(NS, 'circle');
glow.setAttribute('cx', cx); glow.setAttribute('cy', cy);
glow.setAttribute('r', 40);
glow.setAttribute('fill', 'url(#center-glow)');
svg.appendChild(glow);

// Rings
const NUM_RINGS = 40;
let rAccum = 12;

for (let i = 0; i < NUM_RINGS; i++) {
  const t = i / NUM_RINGS; // 0=center, 1=edge
  const isTrauma = rand() < 0.12;
  const gap = isTrauma ? 2 + rand() * 3 : 4 + rand() * 8;
  rAccum += gap;
  if (rAccum > 360) break;

  // Color: heartwood (dark warm brown) → sapwood (pale cream)
  const h = 25 + t * 15 + (rand() - 0.5) * 10;
  const s = 30 + (1 - t) * 15;
  const l = 20 + t * 28;
  const strokeW = isTrauma ? 0.4 + rand() * 0.5 : 0.8 + rand() * 2;

  // Dash pattern — varied per ring for organic texture
  const circumference = 2 * Math.PI * rAccum;
  let dashArray;
  if (isTrauma) {
    // Trauma: short dashes, lots of gaps
    const dash = 2 + rand() * 4;
    const gap2 = 3 + rand() * 6;
    dashArray = `${dash} ${gap2}`;
  } else {
    // Normal: mix of long arcs and small gaps
    const pattern = rand();
    if (pattern < 0.3) {
      // Nearly continuous with tiny breaks
      const dash = circumference * (0.15 + rand() * 0.25);
      const gap2 = 1 + rand() * 3;
      dashArray = `${dash} ${gap2}`;
    } else if (pattern < 0.6) {
      // Medium segments
      const dash = 20 + rand() * 60;
      const gap2 = 2 + rand() * 8;
      dashArray = `${dash} ${gap2}`;
    } else {
      // Long and short alternating
      const d1 = 30 + rand() * 80;
      const g1 = 2 + rand() * 4;
      const d2 = 5 + rand() * 15;
      const g2 = 2 + rand() * 4;
      dashArray = `${d1} ${g1} ${d2} ${g2}`;
    }
  }

  // Create group for rotation
  const g = document.createElementNS(NS, 'g');
  // Rotation: very slow, each ring different speed & direction
  const rotDir = rand() > 0.5 ? 1 : -1;
  const rotDur = 80 + rand() * 200; // 80-280s per full rotation
  g.style.transformOrigin = `${cx}px ${cy}px`;
  g.style.animation = `spin${rotDir > 0 ? 'CW' : 'CCW'} ${rotDur}s linear infinite`;

  const circle = document.createElementNS(NS, 'circle');
  circle.setAttribute('cx', cx);
  circle.setAttribute('cy', cy);
  circle.setAttribute('r', rAccum);
  circle.setAttribute('class', 'ring ring-breathe');
  circle.setAttribute('stroke', `hsl(${h}, ${s}%, ${l}%)`);
  circle.setAttribute('stroke-width', strokeW);
  circle.setAttribute('stroke-dasharray', dashArray);
  // Random starting rotation
  circle.setAttribute('stroke-dashoffset', rand() * circumference);

  // Breathing params
  const alphaLo = isTrauma ? 0.15 : 0.2 + rand() * 0.2;
  const alphaHi = isTrauma ? 0.35 : 0.5 + rand() * 0.35;
  const breathDur = 4 + rand() * 8;
  const breathDelay = rand() * -10;
  circle.style.setProperty('--alpha-lo', alphaLo);
  circle.style.setProperty('--alpha-hi', alphaHi);
  circle.style.setProperty('--dur', breathDur + 's');
  circle.style.setProperty('--delay', breathDelay + 's');

  g.appendChild(circle);
  svg.appendChild(g);
}

// Inject rotation keyframes
const style = document.createElement('style');
style.textContent = `
  @keyframes spinCW { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes spinCCW { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
`;
document.head.appendChild(style);
</script>
</body>
</html>
