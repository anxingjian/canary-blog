<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>珊瑚 / Coral — Growth #3</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #0a1628; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();

let seed = 31903;
function rand() { seed ^= seed << 13; seed ^= seed >> 17; seed ^= seed << 5; return (seed >>> 0) / 4294967296; }
function randRange(a, b) { return a + rand() * (b - a); }

const bg = ctx.createLinearGradient(0, 0, 0, H);
bg.addColorStop(0, '#0a1628');
bg.addColorStop(0.6, '#0d2137');
bg.addColorStop(1, '#162a3a');
ctx.fillStyle = bg;
ctx.fillRect(0, 0, W, H);

ctx.save();
ctx.globalAlpha = 0.03;
ctx.globalCompositeOperation = 'lighter';
for (let i = 0; i < 60; i++) {
  const cx = randRange(0, W);
  const cy = randRange(0, H * 0.5);
  const r = randRange(30, 120);
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  g.addColorStop(0, '#4488aa');
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g;
  ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
}
ctx.restore();

ctx.save();
ctx.globalAlpha = 0.4;
for (let x = 0; x < W; x += 2) {
  const baseY = H - 40 + Math.sin(x * 0.02) * 15 + rand() * 10;
  const h = H - baseY;
  ctx.fillStyle = `hsl(${30 + rand() * 15}, ${20 + rand() * 10}%, ${18 + rand() * 8}%)`;
  ctx.fillRect(x, baseY, 2, h);
}
ctx.restore();

const palettes = [
  { h: [5, 20], s: [35, 55], l: [45, 60] },
  { h: [280, 310], s: [25, 40], l: [50, 65] },
  { h: [30, 50], s: [30, 50], l: [40, 55] },
  { h: [150, 175], s: [25, 40], l: [35, 50] },
];

function growCoral(x, y, angle, length, thickness, depth, palette, drift) {
  if (depth <= 0 || length < 3 || thickness < 0.5) return;
  const p = palettes[palette];
  const h = randRange(p.h[0], p.h[1]);
  const s = randRange(p.s[0], p.s[1]);
  const l = randRange(p.l[0], p.l[1]) - depth * 1.5;
  const segments = Math.max(3, Math.floor(length / 4));
  const segLen = length / segments;
  let cx2 = x, cy2 = y, ca = angle;

  for (let i = 0; i < segments; i++) {
    const nx = cx2 + Math.cos(ca) * segLen;
    const ny = cy2 + Math.sin(ca) * segLen;
    const t = thickness * (1 - i / segments * 0.3);
    ctx.beginPath();
    ctx.moveTo(cx2, cy2);
    ctx.lineTo(nx, ny);
    ctx.strokeStyle = `hsla(${h}, ${s}%, ${l}%, ${0.6 + rand() * 0.3})`;
    ctx.lineWidth = t;
    ctx.lineCap = 'round';
    ctx.stroke();

    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.globalCompositeOperation = 'lighter';
    ctx.beginPath();
    ctx.moveTo(cx2, cy2);
    ctx.lineTo(nx, ny);
    ctx.strokeStyle = `hsl(${h}, ${s + 10}%, ${l + 20}%)`;
    ctx.lineWidth = t * 2.5;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.restore();

    ca += drift * 0.02 + randRange(-0.05, 0.05);
    cx2 = nx;
    cy2 = ny;
  }

  const numBranches = depth > 3 ? Math.floor(randRange(2, 4)) : Math.floor(randRange(1, 3));
  for (let b = 0; b < numBranches; b++) {
    const branchAngle = ca + randRange(-0.7, 0.7);
    const branchLen = length * randRange(0.55, 0.8);
    const branchThick = thickness * randRange(0.5, 0.7);
    const startT = randRange(0.3, 0.9);
    const bx = x + (cx2 - x) * startT;
    const by = y + (cy2 - y) * startT;
    growCoral(bx, by, branchAngle, branchLen, branchThick, depth - 1, palette, drift + randRange(-0.3, 0.3));
  }

  if (depth <= 2) {
    ctx.save();
    ctx.globalAlpha = 0.5 + rand() * 0.3;
    const tipR = thickness * randRange(1.5, 3);
    const g = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, tipR);
    g.addColorStop(0, `hsla(${h}, ${s + 15}%, ${l + 15}%, 0.8)`);
    g.addColorStop(1, `hsla(${h}, ${s}%, ${l}%, 0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx2, cy2, tipR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// Scale colonies to viewport
const sx = W / 800, sy = H / 800;
const colonies = [
  { x: 120*sx, angle: -Math.PI/2+0.15, len: 180*sy, thick: 8*Math.min(sx,sy), depth: 6, palette: 0, drift: 0.4 },
  { x: 280*sx, angle: -Math.PI/2-0.1, len: 220*sy, thick: 10*Math.min(sx,sy), depth: 7, palette: 2, drift: 0.3 },
  { x: 420*sx, angle: -Math.PI/2+0.05, len: 250*sy, thick: 11*Math.min(sx,sy), depth: 7, palette: 1, drift: 0.5 },
  { x: 560*sx, angle: -Math.PI/2-0.2, len: 200*sy, thick: 9*Math.min(sx,sy), depth: 6, palette: 3, drift: 0.2 },
  { x: 680*sx, angle: -Math.PI/2+0.1, len: 190*sy, thick: 8*Math.min(sx,sy), depth: 6, palette: 0, drift: 0.6 },
  { x: 50*sx, angle: -Math.PI/2, len: 80*sy, thick: 4*Math.min(sx,sy), depth: 4, palette: 3, drift: 0.3 },
  { x: 200*sx, angle: -Math.PI/2+0.2, len: 90*sy, thick: 5*Math.min(sx,sy), depth: 4, palette: 1, drift: 0.4 },
  { x: 750*sx, angle: -Math.PI/2-0.15, len: 100*sy, thick: 5*Math.min(sx,sy), depth: 4, palette: 2, drift: 0.2 },
  { x: 500*sx, angle: -Math.PI/2+0.08, len: 70*sy, thick: 3*Math.min(sx,sy), depth: 3, palette: 0, drift: 0.5 },
];

colonies.sort((a, b) => a.len - b.len);
for (const c of colonies) {
  const baseY = H - 35*sy + Math.sin(c.x * 0.02) * 12;
  growCoral(c.x, baseY, c.angle, c.len, c.thick, c.depth, c.palette, c.drift);
}

ctx.save();
for (let i = 0; i < 80; i++) {
  const px = randRange(0, W);
  const py = randRange(0, H);
  const pr = randRange(0.5, 2);
  const alpha = randRange(0.05, 0.2);
  ctx.beginPath();
  ctx.arc(px, py, pr, 0, Math.PI * 2);
  ctx.fillStyle = `hsla(${randRange(180, 220)}, 30%, 70%, ${alpha})`;
  ctx.fill();
}
ctx.restore();

const vig = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.75);
vig.addColorStop(0, 'transparent');
vig.addColorStop(1, 'rgba(5, 10, 20, 0.5)');
ctx.fillStyle = vig;
ctx.fillRect(0, 0, W, H);
</script>
</body>
</html>
