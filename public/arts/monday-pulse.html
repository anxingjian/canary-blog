<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monday Pulse</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const CONFIG = {
  rows: 24,
  cols: 60,
  dotRadius: 1.5,
  maxRadius: 6,
  waveSpeed: 0.008,
  pulseInterval: 3000,
  colorBase: [180, 200, 220],
  colorPulse: [255, 180, 100],
  bgAlpha: 0.08,
};

let W, H, cellW, cellH;
let pulses = [];
let t = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cellW = W / CONFIG.cols;
  cellH = H / CONFIG.rows;
}
window.addEventListener('resize', resize);
resize();

function addPulse() {
  pulses.push({
    x: Math.random() * CONFIG.cols,
    y: Math.random() * CONFIG.rows,
    birth: t,
    life: 200 + Math.random() * 150,
  });
  if (pulses.length > 5) pulses.shift();
}

setInterval(addPulse, CONFIG.pulseInterval);
addPulse();

function lerp(a, b, t) { return a + (b - a) * t; }

function draw() {
  ctx.fillStyle = `rgba(10, 10, 15, ${CONFIG.bgAlpha})`;
  ctx.fillRect(0, 0, W, H);

  t++;

  for (let row = 0; row < CONFIG.rows; row++) {
    for (let col = 0; col < CONFIG.cols; col++) {
      const x = (col + 0.5) * cellW;
      const y = (row + 0.5) * cellH;

      // base breathing
      const breath = Math.sin(t * CONFIG.waveSpeed + col * 0.15 + row * 0.1) * 0.5 + 0.5;
      let radius = CONFIG.dotRadius + breath * 1.5;
      let intensity = 0.15 + breath * 0.2;
      let pulseBlend = 0;

      // pulse influence
      for (const p of pulses) {
        const age = t - p.birth;
        if (age > p.life) continue;
        const dist = Math.sqrt((col - p.x) ** 2 + (row - p.y) ** 2);
        const wavePos = age * 0.15;
        const waveDist = Math.abs(dist - wavePos);
        const waveWidth = 4;
        if (waveDist < waveWidth) {
          const waveIntensity = (1 - waveDist / waveWidth) * (1 - age / p.life);
          radius += waveIntensity * CONFIG.maxRadius;
          intensity += waveIntensity * 0.6;
          pulseBlend = Math.max(pulseBlend, waveIntensity);
        }
      }

      const r = lerp(CONFIG.colorBase[0], CONFIG.colorPulse[0], pulseBlend);
      const g = lerp(CONFIG.colorBase[1], CONFIG.colorPulse[1], pulseBlend);
      const b = lerp(CONFIG.colorBase[2], CONFIG.colorPulse[2], pulseBlend);

      ctx.beginPath();
      ctx.arc(x, y, Math.min(radius, CONFIG.maxRadius), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${r|0}, ${g|0}, ${b|0}, ${Math.min(intensity, 1)})`;
      ctx.fill();
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
