<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>噪声场 / Noise Field</title>
<style>body{margin:0;overflow:hidden;background:#050505}canvas{display:block;width:100vw;height:100vh}</style>
</head><body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=800,H=800;canvas.width=W;canvas.height=H;
const cols=40,rows=40,cellW=W/cols,cellH=H/rows;let time=0;
function noise(x,y,t){return Math.sin(x*0.3+t)*Math.cos(y*0.3+t*0.7)+Math.sin(x*0.1+y*0.1+t*0.5)*0.5;}
function animate(){
  time+=0.015;ctx.fillStyle="rgba(5,5,5,0.05)";ctx.fillRect(0,0,W,H);
  for(let c=0;c<cols;c++)for(let r=0;r<rows;r++){
    const x=c*cellW+cellW/2,y=r*cellH+cellH/2,angle=noise(c,r,time)*Math.PI*2;
    const len=6+Math.sin(time+c*0.2+r*0.3)*3,ex=x+Math.cos(angle)*len,ey=y+Math.sin(angle)*len;
    const n=(noise(c,r,time)+1)/2,isA=n>0.75;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(ex,ey);
    ctx.strokeStyle=isA?`rgba(196,255,0,${n*0.3})`:`rgba(184,184,184,${n*0.15})`;ctx.lineWidth=0.5;ctx.stroke();
  }
  requestAnimationFrame(animate);
}
animate();
</script></body></html>
