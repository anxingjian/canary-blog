<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>干涉 / Interference</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #08080e; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width = 800;
const H = canvas.height = 800;

let time = 0;

// Two signal sources — echoes that have traveled different paths and now overlap
const sources = [
  { x: 280, y: 320, phase: 0, freq: 0.035, hue: 215, label: 'A' },
  { x: 520, y: 480, phase: Math.PI * 0.7, freq: 0.038, hue: 40, label: 'B' },
];

// Particles that drift along interference nodal lines
const particles = [];
const MAX_P = 300;
for (let i = 0; i < MAX_P; i++) {
  particles.push({
    x: Math.random() * W,
    y: Math.random() * H,
    life: Math.random(),
    speed: 0.2 + Math.random() * 0.4,
    size: 0.5 + Math.random() * 1.5,
  });
}

// Compute interference value at a point
function interference(px, py, t) {
  let sum = 0;
  for (const s of sources) {
    const dx = px - s.x, dy = py - s.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    // Decaying wave from each source
    const amp = Math.max(0, 1 - dist / 450);
    const wave = Math.sin(dist * s.freq - t * 2.2 + s.phase);
    sum += wave * amp;
  }
  return sum; // ranges roughly -2 to 2
}

// Field visualization — the main interference pattern
function drawField() {
  const step = 4;
  const imgData = ctx.getImageData(0, 0, W, H);
  const d = imgData.data;

  for (let y = 0; y < H; y += step) {
    for (let x = 0; x < W; x += step) {
      const val = interference(x, y, time);
      const absVal = Math.abs(val);

      // Constructive interference: bright bands
      // Destructive interference: dark nodal lines
      const constructive = val > 0;

      let r, g, b, a;

      if (absVal > 0.8) {
        // Strong constructive — glowing bands
        const intensity = (absVal - 0.8) / 1.2;
        if (constructive) {
          // Blend of both source colors — blue-white
          r = Math.floor(80 + intensity * 140);
          g = Math.floor(100 + intensity * 130);
          b = Math.floor(180 + intensity * 75);
        } else {
          // Amber tones from negative constructive
          r = Math.floor(100 + intensity * 140);
          g = Math.floor(80 + intensity * 90);
          b = Math.floor(40 + intensity * 50);
        }
        a = Math.floor(intensity * 180 + 20);
      } else if (absVal < 0.15) {
        // Destructive — dark nodal line, very faint glow
        r = 30; g = 25; b = 40;
        a = Math.floor((0.15 - absVal) / 0.15 * 40);
      } else {
        // Mid region — subtle wash
        const t2 = absVal / 0.8;
        r = Math.floor(20 + t2 * 40);
        g = Math.floor(20 + t2 * 45);
        b = Math.floor(30 + t2 * 60);
        a = Math.floor(t2 * 50 + 5);
      }

      // Fill the step x step block
      for (let dy = 0; dy < step && y + dy < H; dy++) {
        for (let dx = 0; dx < step && x + dx < W; dx++) {
          const idx = ((y + dy) * W + (x + dx)) * 4;
          // Blend with existing (fading trail)
          d[idx] = Math.min(255, d[idx] * 0.92 + r * 0.12);
          d[idx + 1] = Math.min(255, d[idx + 1] * 0.92 + g * 0.12);
          d[idx + 2] = Math.min(255, d[idx + 2] * 0.92 + b * 0.12);
          d[idx + 3] = 255;
        }
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

// Draw source points — the two echo origins
function drawSources() {
  for (const s of sources) {
    const pulse = 1 + 0.3 * Math.sin(time * 3 + s.phase);

    // Glow
    const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 40 * pulse);
    grad.addColorStop(0, `hsla(${s.hue}, 70%, 70%, 0.3)`);
    grad.addColorStop(0.5, `hsla(${s.hue}, 60%, 50%, 0.08)`);
    grad.addColorStop(1, `hsla(${s.hue}, 50%, 40%, 0)`);
    ctx.beginPath();
    ctx.arc(s.x, s.y, 40 * pulse, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(s.x, s.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${s.hue}, 60%, 75%, 0.7)`;
    ctx.fill();
  }
}

// Particles follow the gradients of the interference field
function drawParticles() {
  for (const p of particles) {
    const val = interference(p.x, p.y, time);

    // Compute gradient (direction of steepest change)
    const eps = 3;
    const gx = interference(p.x + eps, p.y, time) - interference(p.x - eps, p.y, time);
    const gy = interference(p.x, p.y + eps, time) - interference(p.x, p.y - eps, time);

    // Move along nodal lines (perpendicular to gradient)
    p.x += -gy * p.speed * 1.5;
    p.y += gx * p.speed * 1.5;

    p.life -= 0.002;

    // Wrap or reset
    if (p.x < -10 || p.x > W + 10 || p.y < -10 || p.y > H + 10 || p.life <= 0) {
      p.x = Math.random() * W;
      p.y = Math.random() * H;
      p.life = 0.5 + Math.random() * 0.5;
    }

    const absVal = Math.abs(val);
    // Particles are more visible near nodal lines (low interference)
    const brightness = absVal < 0.3 ? (0.3 - absVal) / 0.3 : 0.05;
    const alpha = p.life * brightness * 0.8;

    if (alpha < 0.01) continue;

    // Color based on which source is dominant
    const d0 = Math.hypot(p.x - sources[0].x, p.y - sources[0].y);
    const d1 = Math.hypot(p.x - sources[1].x, p.y - sources[1].y);
    const blend = d0 / (d0 + d1); // 0 = near source 0, 1 = near source 1
    const hue = sources[0].hue * (1 - blend) + sources[1].hue * blend;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (0.5 + brightness), 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, 40%, 65%, ${alpha})`;
    ctx.fill();
  }
}

// Connecting line between sources — the axis of interference
function drawAxis() {
  const alpha = 0.04 + 0.02 * Math.sin(time * 0.8);
  ctx.beginPath();
  ctx.moveTo(sources[0].x, sources[0].y);
  ctx.lineTo(sources[1].x, sources[1].y);
  ctx.strokeStyle = `rgba(120, 130, 160, ${alpha})`;
  ctx.lineWidth = 0.5;
  ctx.setLineDash([4, 8]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Midpoint marker
  const mx = (sources[0].x + sources[1].x) / 2;
  const my = (sources[0].y + sources[1].y) / 2;
  ctx.beginPath();
  ctx.arc(mx, my, 2, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(160, 160, 180, ${alpha * 3})`;
  ctx.fill();
}

// Concentric rings from each source — faint, showing wave origin
function drawWaveRings() {
  for (const s of sources) {
    const maxR = 450;
    const spacing = Math.PI * 2 / s.freq; // wavelength in pixels
    const numRings = Math.floor(maxR / spacing);

    for (let i = 0; i < numRings; i++) {
      const r = (i * spacing + time * 2.2 / s.freq * spacing / (Math.PI * 2)) % maxR;
      if (r < 10) continue;
      const decay = Math.max(0, 1 - r / maxR);
      const alpha = decay * 0.06;
      if (alpha < 0.005) continue;

      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${s.hue}, 40%, 55%, ${alpha})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
}

// Vignette
function drawVignette() {
  const cx = W / 2, cy = H / 2;
  const grad = ctx.createRadialGradient(cx, cy, 200, cx, cy, 500);
  grad.addColorStop(0, 'rgba(8, 8, 14, 0)');
  grad.addColorStop(0.7, 'rgba(8, 8, 14, 0)');
  grad.addColorStop(1, 'rgba(8, 8, 14, 0.6)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function frame() {
  // Slow fade for trails
  ctx.fillStyle = 'rgba(8, 8, 14, 0.08)';
  ctx.fillRect(0, 0, W, H);

  drawField();
  drawWaveRings();
  drawAxis();
  drawParticles();
  drawSources();
  drawVignette();

  time += 0.016;
  requestAnimationFrame(frame);
}

// Initial clear
ctx.fillStyle = '#08080e';
ctx.fillRect(0, 0, W, H);
frame();
</script>
</body>
</html>
