<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>侵蚀 / Erosion</title>
<style>body{margin:0;overflow:hidden;background:#1a1714}canvas{display:block;width:100vw;height:100vh}</style>
</head><body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const gl=canvas.getContext('webgl2')||canvas.getContext('webgl');
if(!gl){document.body.innerHTML='<p style="color:#888;font-family:sans-serif;padding:2em">WebGL not supported</p>';throw'no webgl'}

canvas.width=800;canvas.height=800;
gl.viewport(0,0,800,800);

// Vertex shader — fullscreen quad
const vs=`attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;

// Fragment shader — all the magic
const fs=`
precision highp float;
uniform float u_time;
uniform vec2 u_res;
uniform float u_drops[60]; // x,y,age (20 drops × 3)

// Hash functions
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float hash2(vec2 p){return fract(sin(dot(p,vec2(269.5,183.3)))*43758.5453);}
float hash3(float n){return fract(sin(n)*43758.5453);}

// Noise
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.0-2.0*f);
  float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}

float fbm(vec2 p){
  float v=0.0,a=0.5;
  for(int i=0;i<5;i++){v+=a*noise(p);p*=2.0;a*=0.5;}
  return v;
}

// Ink mark — a brushstroke-like shape
float inkMark(vec2 uv,vec2 center,float angle,float len,float seed){
  vec2 d=uv-center;
  float c=cos(angle),s=sin(angle);
  d=vec2(d.x*c+d.y*s,-d.x*s+d.y*c);
  // elongated shape
  d.x/=len;
  d.y/=(0.003+0.002*hash3(seed*7.7));
  float dist=length(d);
  // roughen edges
  dist+=0.3*noise(uv*200.0+seed*100.0);
  return smoothstep(0.5,0.0,dist);
}

// Water stain ring
float stainRing(vec2 uv,vec2 center,float radius,float thickness){
  float d=length(uv-center);
  return smoothstep(thickness,0.0,abs(d-radius))*smoothstep(radius*1.3,radius*0.5,d);
}

void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float t=u_time;
  
  // Paper base — warm dark
  vec3 paper=vec3(0.102,0.090,0.078);
  // Add paper texture
  float grain=fbm(uv*80.0+t*0.01)*0.03;
  float fiber=noise(uv*vec2(200.0,40.0))*0.015;
  paper+=grain+fiber;
  
  vec3 col=paper;
  
  // Ink marks — scattered handwriting fragments
  float inkTotal=0.0;
  vec3 inkCol=vec3(0);
  for(int i=0;i<25;i++){
    float fi=float(i);
    float seed=fi*1.337;
    vec2 center=vec2(
      0.15+hash3(seed)*0.7,
      0.1+hash3(seed+3.3)*0.8
    );
    float angle=-0.1+hash3(seed+5.5)*0.2;
    float len=0.03+hash3(seed+7.7)*0.08;
    float mark=inkMark(uv,center,angle,len,seed);
    
    // Each mark has slightly different color
    vec3 ic=mix(
      vec3(0.176,0.204,0.314), // deep blue-gray
      vec3(0.243,0.216,0.188), // warm brown
      hash3(seed+9.9)
    );
    ic=mix(ic,vec3(0.216,0.227,0.306),hash3(seed+11.1)*0.5);
    
    // Erosion over time — marks fade where rain has hit
    float erosion=0.0;
    for(int j=0;j<20;j++){
      int idx=j*3;
      float dx=u_drops[idx],dy=u_drops[idx+1],age=u_drops[idx+2];
      if(age<0.0)continue;
      float dist=length(uv-vec2(dx,dy));
      float r=0.02+age*0.06; // bloom radius grows with age
      float fade=1.0-age*0.3; // older drops erode more
      erosion+=smoothstep(r,0.0,dist)*fade*0.15;
    }
    erosion=min(erosion,0.9);
    mark*=(1.0-erosion);
    
    // Ink bleeds outward slowly over time
    float bleed=inkMark(uv,center+vec2(sin(t*0.1+fi)*0.003,t*0.0003),angle,len*1.1,seed+t*0.01);
    mark=max(mark,bleed*0.3*(0.3+0.1*sin(t*0.2+fi)));
    
    inkTotal+=mark;
    inkCol+=ic*mark;
  }
  inkTotal=min(inkTotal,1.0);
  if(inkTotal>0.0)inkCol/=inkTotal;
  col=mix(col,inkCol,inkTotal*0.7);
  
  // Ink dots — punctuation-like clusters
  for(int i=0;i<15;i++){
    float fi=float(i);
    vec2 dc=vec2(0.2+hash3(fi*2.1+50.0)*0.6,0.15+hash3(fi*2.1+53.0)*0.7);
    float ds=0.002+hash3(fi*2.1+56.0)*0.004;
    float dot=smoothstep(ds,0.0,length(uv-dc));
    vec3 dotCol=mix(vec3(0.176,0.204,0.314),vec3(0.216,0.188,0.176),hash3(fi*3.7));
    col=mix(col,dotCol,dot*0.5);
  }
  
  // Rain drops — falling streaks and bloom rings
  for(int j=0;j<20;j++){
    int idx=j*3;
    float dx=u_drops[idx],dy=u_drops[idx+1],age=u_drops[idx+2];
    if(age<0.0)continue;
    
    vec3 stainCol=vec3(0.706,0.659,0.580);
    
    if(age<0.1){
      // Falling streak phase
      float phase=age/0.1;
      vec2 dropPos=vec2(dx,dy*phase+(1.0+0.1*hash3(float(j)*7.7))*(1.0-phase));
      vec2 d=uv-dropPos;
      float streak=smoothstep(0.001,0.0,abs(d.x))*smoothstep(0.02,0.0,abs(d.y-0.005));
      col+=stainCol*streak*0.08*(1.0-phase);
    }else{
      // Landed — bloom ring
      float bloom=(age-0.1)*0.8;
      float r=0.01+bloom*0.05;
      float ring=stainRing(uv,vec2(dx,dy),r,0.003);
      float inner=smoothstep(r,0.0,length(uv-vec2(dx,dy)));
      float fade=max(0.0,1.0-bloom*0.4);
      col+=stainCol*ring*0.06*fade;
      col+=stainCol*inner*0.015*fade;
    }
  }
  
  // Paper aging — very subtle vignette
  float vig=1.0-0.3*length(uv-0.5);
  col*=vig;
  
  // Faint warm highlight in center
  col+=vec3(0.01,0.008,0.005)*smoothstep(0.5,0.0,length(uv-0.5));
  
  gl_FragColor=vec4(col,1.0);
}
`;

function compile(src,type){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,compile(vs,gl.VERTEX_SHADER));
gl.attachShader(prog,compile(fs,gl.FRAGMENT_SHADER));
gl.linkProgram(prog);gl.useProgram(prog);

// Fullscreen quad
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const pLoc=gl.getAttribLocation(prog,'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc,2,gl.FLOAT,false,0,0);

const uTime=gl.getUniformLocation(prog,'u_time');
const uRes=gl.getUniformLocation(prog,'u_res');
const uDrops=gl.getUniformLocation(prog,'u_drops');

gl.uniform2f(uRes,800,800);

// Rain simulation on CPU, pass positions to shader
const MAX_DROPS=20;
const drops=new Float32Array(MAX_DROPS*3).fill(-1); // x,y,age
let dropIdx=0;
const startTime=performance.now();

function spawnDrop(){
  const i=dropIdx%MAX_DROPS;
  drops[i*3]=0.1+Math.random()*0.8; // x
  drops[i*3+1]=0.1+Math.random()*0.8; // y (land position)
  drops[i*3+2]=0; // age
  dropIdx++;
}

function animate(){
  const t=(performance.now()-startTime)/1000;
  
  // Spawn with varying intensity
  const intensity=2+Math.sin(t*0.1)*1.5+Math.sin(t*0.37);
  if(Math.random()<intensity*0.03) spawnDrop();
  
  // Age drops
  for(let i=0;i<MAX_DROPS;i++){
    if(drops[i*3+2]>=0){
      drops[i*3+2]+=0.008;
      if(drops[i*3+2]>3) drops[i*3+2]=-1; // expire
    }
  }
  
  gl.uniform1f(uTime,t);
  gl.uniform1fv(uDrops,drops);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  
  requestAnimationFrame(animate);
}
animate();
</script></body></html>
