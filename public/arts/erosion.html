<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>侵蚀 / Erosion</title>
<style>body{margin:0;overflow:hidden;background:#1a1714}canvas{display:block;width:100vw;height:100vh}</style>
</head><body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=canvas.width=800,H=canvas.height=800;

// Aged paper base colors
const paperBase=[26,23,20];
const inkColors=[
  [45,52,80],[35,42,68],[55,48,72],[40,58,78],[62,55,48]
];
const stainColor=[180,168,148];

// Persistent layer for accumulated marks
const persist=document.createElement('canvas');
persist.width=W;persist.height=H;
const pctx=persist.getContext('2d');
pctx.fillStyle=`rgb(${paperBase})`;
pctx.fillRect(0,0,W,H);

// Seed initial ink marks — like handwriting fragments
function seedMarks(){
  for(let i=0;i<60;i++){
    const x=W*0.15+Math.random()*W*0.7;
    const y=H*0.1+Math.random()*H*0.8;
    const ink=inkColors[Math.floor(Math.random()*inkColors.length)];
    const len=20+Math.random()*80;
    const angle=-0.1+Math.random()*0.2;
    pctx.beginPath();
    pctx.moveTo(x,y);
    const segs=Math.floor(3+Math.random()*8);
    let cx=x,cy=y;
    for(let s=0;s<segs;s++){
      cx+=len/segs*Math.cos(angle)+(Math.random()-0.5)*4;
      cy+=len/segs*Math.sin(angle)+(Math.random()-0.5)*2;
      pctx.lineTo(cx,cy);
    }
    pctx.strokeStyle=`rgba(${ink[0]},${ink[1]},${ink[2]},${0.4+Math.random()*0.4})`;
    pctx.lineWidth=0.5+Math.random()*2;
    pctx.stroke();
  }
  // clusters of dots like punctuation
  for(let i=0;i<30;i++){
    const x=W*0.2+Math.random()*W*0.6;
    const y=H*0.15+Math.random()*H*0.7;
    const ink=inkColors[Math.floor(Math.random()*inkColors.length)];
    pctx.beginPath();
    pctx.arc(x,y,1+Math.random()*3,0,Math.PI*2);
    pctx.fillStyle=`rgba(${ink[0]},${ink[1]},${ink[2]},${0.5+Math.random()*0.3})`;
    pctx.fill();
  }
}
seedMarks();

// Rain drops and their bloom effects
class Drop{
  constructor(){
    this.x=Math.random()*W;
    this.y=-10-Math.random()*100;
    this.speed=3+Math.random()*4;
    this.size=1+Math.random()*2;
    this.landed=false;
    this.bloom=0;
    this.maxBloom=15+Math.random()*40;
    this.bloomSpeed=0.3+Math.random()*0.5;
    this.opacity=0.15+Math.random()*0.2;
    this.life=1;
  }
  update(){
    if(!this.landed){
      this.y+=this.speed;
      if(this.y>=H*0.1+Math.random()*H*0.85){
        this.landed=true;
        this.landX=this.x;
        this.landY=this.y;
        // erode the persistent layer where it lands
        this.erode();
      }
    }else{
      this.bloom+=this.bloomSpeed;
      this.life-=0.005;
    }
  }
  erode(){
    // Sample color at land point, blend toward paper
    const r=this.maxBloom*1.5;
    pctx.save();
    pctx.globalCompositeOperation='source-atop';
    const grad=pctx.createRadialGradient(this.landX,this.landY,0,this.landX,this.landY,r);
    grad.addColorStop(0,`rgba(${paperBase[0]+8},${paperBase[1]+6},${paperBase[2]+4},0.03)`);
    grad.addColorStop(0.5,`rgba(${paperBase[0]+4},${paperBase[1]+3},${paperBase[2]+2},0.015)`);
    grad.addColorStop(1,'rgba(0,0,0,0)');
    pctx.fillStyle=grad;
    pctx.fillRect(this.landX-r,this.landY-r,r*2,r*2);
    pctx.restore();
    // Leave a faint water stain
    pctx.save();
    pctx.globalAlpha=0.008;
    pctx.beginPath();
    pctx.arc(this.landX,this.landY,r*0.7,0,Math.PI*2);
    pctx.strokeStyle=`rgb(${stainColor})`;
    pctx.lineWidth=0.5;
    pctx.stroke();
    pctx.restore();
  }
  draw(ctx){
    if(!this.landed){
      // falling streak
      ctx.beginPath();
      ctx.moveTo(this.x,this.y);
      ctx.lineTo(this.x-0.3,this.y-8-this.speed*2);
      ctx.strokeStyle=`rgba(${stainColor[0]},${stainColor[1]},${stainColor[2]},${0.08+this.size*0.02})`;
      ctx.lineWidth=this.size*0.5;
      ctx.stroke();
    }else if(this.life>0){
      // bloom ring
      const a=this.opacity*this.life;
      ctx.beginPath();
      ctx.arc(this.landX,this.landY,this.bloom,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${stainColor[0]},${stainColor[1]},${stainColor[2]},${a*0.3})`;
      ctx.lineWidth=0.5;
      ctx.stroke();
      // inner glow
      if(this.bloom<this.maxBloom*0.5){
        const grad=ctx.createRadialGradient(this.landX,this.landY,0,this.landX,this.landY,this.bloom);
        grad.addColorStop(0,`rgba(${stainColor[0]},${stainColor[1]},${stainColor[2]},${a*0.08})`);
        grad.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=grad;
        ctx.fill();
      }
    }
  }
  get dead(){return this.landed&&this.life<=0}
}

// Ink bleed particles — ink slowly migrating outward from marks
class InkBleed{
  constructor(x,y,color){
    this.x=x;this.y=y;
    this.ox=x;this.oy=y;
    this.color=color;
    this.vx=(Math.random()-0.5)*0.3;
    this.vy=Math.random()*0.2+0.05;
    this.life=1;
    this.decay=0.002+Math.random()*0.003;
    this.size=0.5+Math.random()*1.5;
  }
  update(){
    this.x+=this.vx;
    this.y+=this.vy;
    this.vx*=0.99;
    this.vy*=0.995;
    this.life-=this.decay;
  }
  draw(){
    if(this.life<=0)return;
    pctx.globalAlpha=this.life*0.015;
    pctx.beginPath();
    pctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    pctx.fillStyle=`rgb(${this.color})`;
    pctx.fill();
    pctx.globalAlpha=1;
  }
  get dead(){return this.life<=0}
}

let drops=[];
let bleeds=[];
let frame=0;
const startTime=performance.now();

function animate(){
  frame++;
  const t=(performance.now()-startTime)/1000;
  
  // Spawn rain — intensity varies like real rain
  const intensity=2+Math.sin(t*0.1)*1.5+Math.sin(t*0.37)*1;
  if(Math.random()<intensity*0.15){
    drops.push(new Drop());
  }
  
  // Occasional ink bleeds from random positions
  if(frame%8===0){
    const bx=W*0.15+Math.random()*W*0.7;
    const by=H*0.1+Math.random()*H*0.8;
    const ink=inkColors[Math.floor(Math.random()*inkColors.length)];
    bleeds.push(new InkBleed(bx,by,ink));
  }
  
  // Update
  drops.forEach(d=>d.update());
  bleeds.forEach(b=>{b.update();b.draw()});
  drops=drops.filter(d=>!d.dead);
  bleeds=bleeds.filter(b=>!b.dead);
  
  // Draw
  ctx.clearRect(0,0,W,H);
  // Draw persistent layer
  ctx.drawImage(persist,0,0);
  
  // Subtle paper texture grain
  if(frame%3===0){
    ctx.save();
    ctx.globalAlpha=0.02;
    for(let i=0;i<50;i++){
      const gx=Math.random()*W,gy=Math.random()*H;
      const gs=Math.random()*2;
      ctx.fillStyle=Math.random()>0.5?'rgba(255,255,240,1)':'rgba(0,0,0,1)';
      ctx.fillRect(gx,gy,gs,gs);
    }
    ctx.restore();
  }
  
  // Draw active drops
  drops.forEach(d=>d.draw(ctx));
  
  // Very slow overall fade — paper ages
  if(frame%120===0){
    pctx.save();
    pctx.globalAlpha=0.003;
    pctx.fillStyle=`rgb(${paperBase[0]+2},${paperBase[1]+1},${paperBase[2]})`;
    pctx.fillRect(0,0,W,H);
    pctx.restore();
  }
  
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script></body></html>
