<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>晨雾 / Morning Haze</title>
<style>body{margin:0;overflow:hidden;background:#1a1e2a}</style>
</head><body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();window.onresize=resize;

const CONFIG={
  layers:5,
  particlesPerLayer:60,
  palette:[
    [45,52,78],    // deep night blue
    [72,85,120],   // steel blue
    [140,155,180], // mist
    [200,195,185], // warm grey
    [235,225,210], // cream
  ],
  drift:0.15,
  rise:-0.08,
  breathAmp:0.3,
  breathSpeed:0.0004
};

class Particle{
  constructor(layer){
    this.layer=layer;
    this.reset(true);
  }
  reset(init){
    this.x=init?Math.random()*W:-50+Math.random()*50;
    this.y=Math.random()*H;
    this.r=20+Math.random()*80*(1+this.layer*0.4);
    this.baseAlpha=0.015+Math.random()*0.035*(1+this.layer*0.15);
    this.vx=CONFIG.drift*(0.5+this.layer*0.3)*(0.7+Math.random()*0.6);
    this.vy=CONFIG.rise*(0.5+Math.random());
    this.phase=Math.random()*Math.PI*2;
    this.wobbleAmp=0.2+Math.random()*0.5;
    this.wobbleSpeed=0.0005+Math.random()*0.001;
  }
  update(t){
    const breath=Math.sin(t*CONFIG.breathSpeed+this.phase)*CONFIG.breathAmp;
    this.x+=this.vx+Math.sin(t*this.wobbleSpeed+this.phase)*this.wobbleAmp;
    this.y+=this.vy+breath*0.1;
    if(this.x>W+this.r*2||this.y<-this.r*2){this.reset(false);this.x=-this.r;this.y=Math.random()*H}
  }
  draw(t){
    const c=CONFIG.palette[this.layer%CONFIG.palette.length];
    const breath=Math.sin(t*CONFIG.breathSpeed*0.7+this.phase)*0.5+0.5;
    const a=this.baseAlpha*(0.6+breath*0.4);
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
    g.addColorStop(0,`rgba(${c[0]},${c[1]},${c[2]},${a})`);
    g.addColorStop(0.5,`rgba(${c[0]},${c[1]},${c[2]},${a*0.4})`);
    g.addColorStop(1,`rgba(${c[0]},${c[1]},${c[2]},0)`);
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fill();
  }
}

const particles=[];
for(let l=0;l<CONFIG.layers;l++){
  for(let i=0;i<CONFIG.particlesPerLayer;i++){
    particles.push(new Particle(l));
  }
}

// subtle horizontal light bands
function drawAmbient(t){
  const shift=Math.sin(t*0.0002)*0.02;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,`rgba(25,30,45,1)`);
  g.addColorStop(0.3+shift,`rgba(40,50,75,1)`);
  g.addColorStop(0.6,`rgba(55,65,90,1)`);
  g.addColorStop(1,`rgba(30,35,50,1)`);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  
  // faint horizon glow
  const hY=H*0.55;
  const hg=ctx.createRadialGradient(W*0.5,hY,0,W*0.5,hY,W*0.6);
  hg.addColorStop(0,`rgba(180,170,155,${0.04+shift})`);
  hg.addColorStop(0.5,`rgba(120,115,105,0.02)`);
  hg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=hg;ctx.fillRect(0,0,W,H);
}

function frame(t){
  drawAmbient(t);
  for(const p of particles){p.update(t);p.draw(t)}
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body></html>
