<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora — 2026.03.16</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');

let W, H, mouse = { x: 0.5, y: 0.5 };

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  gl.viewport(0, 0, W, H);
}
resize();
addEventListener('resize', resize);
addEventListener('mousemove', e => {
  mouse.x = e.clientX / W;
  mouse.y = 1.0 - e.clientY / H;
});

const vs = `attribute vec2 p; void main(){ gl_Position=vec4(p,0,1); }`;
const fs = `
precision highp float;
uniform float t;
uniform vec2 r;
uniform vec2 m;

// simplex-ish noise
vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
vec4 mod289(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 perm(vec4 x){return mod289(((x*34.)+1.)*x);}
float snoise(vec3 v){
  const vec2 C=vec2(1./6.,1./3.);
  const vec4 D=vec4(0.,.5,1.,2.);
  vec3 i=floor(v+dot(v,C.yyy));
  vec3 x0=v-i+dot(i,C.xxx);
  vec3 g=step(x0.yzx,x0.xyz);
  vec3 l=1.-g;
  vec3 i1=min(g,l.zxy);
  vec3 i2=max(g,l.zxy);
  vec3 x1=x0-i1+C.xxx;
  vec3 x2=x0-i2+C.yyy;
  vec3 x3=x0-D.yyy;
  i=mod289(i);
  vec4 p=perm(perm(perm(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));
  float n_=1./7.;
  vec3 ns=n_*D.wyz-D.xzx;
  vec4 j=p-49.*floor(p*ns.z*ns.z);
  vec4 x_=floor(j*ns.z);
  vec4 y_=floor(j-7.*x_);
  vec4 x=x_*ns.x+ns.yyyy;
  vec4 y=y_*ns.x+ns.yyyy;
  vec4 h=1.-abs(x)-abs(y);
  vec4 b0=vec4(x.xy,y.xy);
  vec4 b1=vec4(x.zw,y.zw);
  vec4 s0=floor(b0)*2.+1.;
  vec4 s1=floor(b1)*2.+1.;
  vec4 sh=-step(h,vec4(0.));
  vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;
  vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
  vec3 p0=vec3(a0.xy,h.x);
  vec3 p1=vec3(a0.zw,h.y);
  vec3 p2=vec3(a1.xy,h.z);
  vec3 p3=vec3(a1.zw,h.w);
  vec4 norm=1.79284291400159-.85373472095314*vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3));
  p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
  vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);
  m=m*m;
  return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}

void main(){
  vec2 uv=gl_FragCoord.xy/r;
  vec2 p=uv*2.-1.;
  p.x*=r.x/r.y;

  // Aurora curtain shape — vertical bands that wave
  float curtain=0.;
  for(float i=0.;i<5.;i++){
    float freq=1.2+i*0.7;
    float speed=0.15+i*0.05;
    float amp=0.3-i*0.04;
    float wave=snoise(vec3(p.x*freq+t*speed, t*0.1+i*3.7, i*1.3));
    // Mouse influence
    float mInfluence=1.+0.5*sin((m.x-0.5)*6.28+i);
    wave*=mInfluence;
    // Vertical falloff — aurora sits in upper half
    float yCenter=0.3+amp*wave;
    float band=exp(-pow((p.y-yCenter)*2.5,2.));
    curtain+=band*(0.5+0.5*wave);
  }
  curtain=clamp(curtain*0.35,0.,1.);

  // Color: teal → green → purple → pink, shifting with position and time
  vec3 col1=vec3(0.1,0.9,0.6);   // teal-green
  vec3 col2=vec3(0.2,1.0,0.3);   // bright green
  vec3 col3=vec3(0.5,0.2,0.9);   // purple
  vec3 col4=vec3(0.9,0.3,0.6);   // pink

  float colorShift=snoise(vec3(p.x*0.8+t*0.07, p.y*0.5, t*0.05))*0.5+0.5;
  float colorShift2=snoise(vec3(p.x*0.3-t*0.04, p.y*0.8+t*0.03, 5.0))*0.5+0.5;

  vec3 auroraColor=mix(mix(col1,col2,colorShift), mix(col3,col4,colorShift2), snoise(vec3(p*0.6,t*0.08))*0.5+0.5);

  // Subtle shimmer
  float shimmer=snoise(vec3(p*8.,t*0.5))*0.08;
  curtain+=shimmer*curtain;

  // Stars in background
  float stars=0.;
  for(float i=0.;i<3.;i++){
    vec2 starUV=uv*200.*(1.+i*0.5);
    vec2 id=floor(starUV);
    vec2 f=fract(starUV)-0.5;
    float rnd=fract(sin(dot(id,vec2(127.1+i*50.,311.7)))*43758.5453);
    if(rnd>0.97){
      float brightness=fract(sin(dot(id,vec2(269.5,183.3)))*43758.5453);
      float twinkle=0.5+0.5*sin(t*2.+rnd*6.28);
      stars+=smoothstep(0.4,0.,length(f))*brightness*twinkle*(1.-curtain*2.);
    }
  }

  // Night sky gradient
  vec3 sky=mix(vec3(0.0,0.0,0.02), vec3(0.02,0.01,0.06), uv.y);

  // Compose
  vec3 color=sky+auroraColor*curtain*1.2+vec3(0.7,0.8,0.9)*stars*0.5;

  // Subtle vignette
  float vig=1.-0.4*length(p*0.7);
  color*=vig;

  gl_FragColor=vec4(color,1.);
}
`;

function createShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(vs, gl.VERTEX_SHADER));
gl.attachShader(prog, createShader(fs, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const tLoc = gl.getUniformLocation(prog, 't');
const rLoc = gl.getUniformLocation(prog, 'r');
const mLoc = gl.getUniformLocation(prog, 'm');

let start = performance.now();
function draw() {
  const elapsed = (performance.now() - start) / 1000;
  gl.uniform1f(tLoc, elapsed);
  gl.uniform2f(rLoc, W, H);
  gl.uniform2f(mLoc, mouse.x, mouse.y);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
