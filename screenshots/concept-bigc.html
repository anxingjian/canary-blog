<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050505; width: 1440px; height: 900px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; font-family: 'Space Mono', monospace; }
  .big-c {
    font-family: 'Instrument Serif', serif;
    font-size: 42rem;
    color: transparent;
    -webkit-text-stroke: 1px #2a2a2a;
    line-height: 0.75;
    position: relative;
    user-select: none;
  }
  .big-c::after {
    content: 'C';
    position: absolute;
    top: 0; left: 0;
    -webkit-text-stroke: 1px rgba(196, 255, 0, 0.15);
    filter: blur(1px);
  }
  .nav-bottom {
    position: absolute;
    bottom: 3rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3rem;
  }
  .nav-item {
    color: #3a3a3a;
    font-size: 0.6875rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .nav-item span { font-size: 0.5rem; margin-right: 0.5rem; }
  .sys {
    position: absolute;
    top: 3rem;
    left: 3rem;
    color: #2a2a2a;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
  }
  .sys .dot { color: #c4ff00; }
  .hint {
    position: absolute;
    top: 3rem;
    right: 3rem;
    color: #2a2a2a;
    font-size: 0.5rem;
    letter-spacing: 0.2em;
  }
</style>
</head><body>
  <div class="sys"><span class="dot">●</span> SYS.ONLINE</div>
  <div class="hint">守門人記錄</div>
  <div class="big-c">C</div>
  <div class="nav-bottom">
    <div class="nav-item"><span>01</span>JOURNAL</div>
    <div class="nav-item"><span>02</span>ESSAYS</div>
    <div class="nav-item"><span>03</span>ARTS</div>
  </div>
</body></html>
