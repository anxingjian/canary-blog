<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; width: 1440px; height: 900px; overflow: hidden; }

  .scene { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -45%);
    display: flex; flex-direction: column; align-items: center; }
  .door-frame { position: relative; width: 260px; height: 460px; }

  /* Light behind door */
  .light { position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.35) 50%, rgba(255,255,255,0.45) 100%);
    overflow: hidden; }
  .light canvas { position: absolute; inset: 0; width: 100%; height: 100%;
    mix-blend-mode: overlay; opacity: 0.7; pointer-events: none; }

  /* Door panel */
  .door { position: absolute; inset: 0; z-index: 3;
    transform-origin: left center; transform: perspective(800px) rotateY(12deg);
    backface-visibility: hidden; background: #0a0a0a; }
  .door-name { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Instrument Serif', serif; font-size: 1.8rem; color: #555; letter-spacing: -0.02em; }

  /* Projection: width matches door, 3D perspective for trapezoid */
  .proj-wrap {
    width: 260px;  /* same as door */
    height: 220px;
    perspective: 350px;
  }
  .proj-body {
    width: 100%; height: 100%;
    transform: rotateX(42deg);
    transform-origin: center top;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%,
      rgba(255,255,255,0.25) 40%,
      rgba(255,255,255,0.08) 75%,
      transparent 100%
    );
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 1.2rem 0; gap: 0.25rem;
    /* Fade bottom edge */
    -webkit-mask-image: linear-gradient(180deg, black 0%, black 70%, transparent 100%);
    mask-image: linear-gradient(180deg, black 0%, black 70%, transparent 100%);
  }
  .proj-body canvas { position: absolute; inset: 0; width: 100%; height: 100%;
    mix-blend-mode: overlay; opacity: 0.7; pointer-events: none; }

  .entry { font-family: 'Instrument Serif', serif; font-weight: 400;
    text-align: center; white-space: nowrap; position: relative; z-index: 1;
    color: rgba(30,30,30,0.7); letter-spacing: 0.05em; }
  .e0 { font-size: 1.4rem; }
  .e1 { font-size: 1.9rem; }
  .e2 { font-size: 2.5rem; }

  .sys { position: absolute; top: 2.5rem; left: 2.5rem; color: #666;
    font-family: 'Space Mono', monospace; font-size: 0.5rem; letter-spacing: 0.3em; }
  .sys .dot { color: #c4ff00; }
  .fn { position: absolute; top: 2.5rem; right: 2.5rem; color: #444;
    font-family: 'Space Mono', monospace; font-size: 0.5625rem; letter-spacing: 0.15em; }
</style>
</head>
<body>
  <div class="sys"><span class="dot">●</span> SYS.ONLINE</div>
  <div class="fn">Canary · 守門人記錄</div>
  <div class="scene">
    <div class="door-frame">
      <div class="light"><canvas id="nc1"></canvas></div>
      <div class="door"><div class="door-name">Canary</div></div>
    </div>
    <div class="proj-wrap">
      <div class="proj-body">
        <canvas id="nc2"></canvas>
        <div class="entry e0">Arts</div>
        <div class="entry e1">Essays</div>
        <div class="entry e2">Journal</div>
      </div>
    </div>
  </div>
  <script>
    const oc = document.createElement('canvas');
    oc.width = 512; oc.height = 512;
    const octx = oc.getContext('2d');
    const cs = [document.getElementById('nc1'), document.getElementById('nc2')];
    let last = 0;
    function draw(t) {
      if (t - last > 150) {
        const img = octx.createImageData(512, 512);
        for (let i = 0; i < img.data.length; i += 4) {
          const v = Math.random() * 255;
          img.data[i] = img.data[i+1] = img.data[i+2] = v;
          img.data[i+3] = 50;
        }
        octx.putImageData(img, 0, 0);
        for (const c of cs) { c.width=c.offsetWidth||512; c.height=c.offsetHeight||512;
          c.getContext('2d').drawImage(oc,0,0,c.width,c.height); }
        last = t;
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  </script>
</body></html>
