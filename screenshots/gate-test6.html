<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; width: 1440px; height: 900px; overflow: hidden; }
  .scene { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -45%);
    display: flex; flex-direction: column; align-items: center; }
  .door-frame { position: relative; width: 260px; height: 460px; }
  .light { position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.35) 50%, rgba(255,255,255,0.45) 100%);
    overflow: hidden; }
  .noise { position: absolute; inset: 0; background: url('https://www.ui-layouts.com/noise.gif') repeat;
    background-size: 150px; opacity: 0.24; mix-blend-mode: overlay; pointer-events: none; }
  .door { position: absolute; inset: 0; z-index: 3;
    transform-origin: left center; transform: perspective(800px) rotateY(12deg);
    backface-visibility: hidden; background: #0a0a0a; }
  .door-name { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Instrument Serif', serif; font-size: 1.8rem; color: #555; }

  .proj-outer { width: 500px; height: 220px; }
  .proj { width: 100%; height: 100%;
    clip-path: polygon(24% 0%, 76% 0%, 100% 100%, 0% 100%);
    background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.25) 40%, rgba(255,255,255,0.08) 75%, transparent 100%);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 0.8rem 0; gap: 0;
    -webkit-mask-image: linear-gradient(180deg, black 0%, black 70%, transparent 100%);
    mask-image: linear-gradient(180deg, black 0%, black 70%, transparent 100%);
  }
  .entry { font-family: 'Instrument Serif', serif; font-weight: 400;
    text-align: center; white-space: nowrap; position: relative; z-index: 1;
    color: rgba(30,30,30,0.7); letter-spacing: 0.05em;
    transform: perspective(300px) rotateX(8deg); transform-origin: center top; }
  .e0 { font-size: 1.8rem; margin-top: 0; }
  .e1 { font-size: 2.2rem; margin-top: -0.15rem; }
  .e2 { font-size: 3rem; margin-top: -0.15rem; }
</style>
</head>
<body>
  <div class="scene">
    <div class="door-frame">
      <div class="light"><div class="noise"></div></div>
      <div class="door"><div class="door-name">Canary</div></div>
    </div>
    <div class="proj-outer">
      <div class="proj">
        <div class="noise"></div>
        <div class="entry e0">Arts</div>
        <div class="entry e1">Essays</div>
        <div class="entry e2">Journal</div>
      </div>
    </div>
  </div>
</body></html>
