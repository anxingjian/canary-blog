<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020202; width: 1440px; height: 900px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; }
  .sys { position: absolute; top: 2.5rem; left: 2.5rem; color: #1a1a1a; font-size: 0.5rem; letter-spacing: 0.3em; z-index: 20; }
  .sys .dot { color: #c4ff00; }

  .assembly { display: flex; flex-direction: column; align-items: center; }

  .door-wrap { position: relative; width: 260px; height: 460px; }

  .door-light { position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(196,255,0,0.10) 0%, rgba(196,255,0,0.06) 40%, rgba(196,255,0,0.12) 100%);
    z-index: 1; }

  .door { position: absolute; inset: 0; transform-origin: left center;
    transform: perspective(800px) rotateY(-42deg); z-index: 3; }

  .door-face { position: absolute; inset: 0;
    background: linear-gradient(90deg, #0e0e0e 0%, #151515 30%, #1a1a1a 100%); }

  .door-edge { position: absolute; top: 0; bottom: 0; right: 0; width: 3px;
    background: rgba(196,255,0,0.2); }

  .door-shadow { position: absolute; top: 0; bottom: 0; left: 0; width: 30%;
    background: linear-gradient(90deg, rgba(0,0,0,0.3) 0%, transparent 100%); }

  .door-name { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Space Mono', monospace; font-size: 0.65rem; font-weight: 700;
    color: #1a1a1a; letter-spacing: 0.4em; text-transform: uppercase; }

  .door-handle { position: absolute; right: 14%; top: 50%; transform: translateY(-50%);
    width: 3px; height: 28px; background: #333; border-radius: 1.5px; }

  .frame { position: absolute; inset: 0; border: 2px solid #181818; z-index: 4; pointer-events: none; }

  .floor {
    width: 450px; height: 200px;
    background: linear-gradient(180deg, rgba(196,255,0,0.10) 0%, rgba(196,255,0,0.05) 40%, rgba(196,255,0,0.01) 80%, transparent 100%);
    clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0.3rem; padding-top: 1rem; perspective: 400px;
  }
  .floor-entry {
    font-family: 'Instrument Serif', serif;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transform-origin: center top;
  }
  .e1 { font-size: 1.4rem; color: rgba(196,255,0,0.15); transform: perspective(400px) rotateX(50deg) scaleY(1.3); }
  .e2 { font-size: 2rem; color: rgba(196,255,0,0.23); transform: perspective(400px) rotateX(50deg) scaleY(1.45); }
  .e3 { font-size: 2.8rem; color: rgba(196,255,0,0.31); transform: perspective(400px) rotateX(50deg) scaleY(1.6); }
</style>
</head>
<body>
  <div class="sys"><span class="dot">●</span> SYS.ONLINE</div>
  <div class="assembly">
    <div class="door-wrap">
      <div class="door-light"></div>
      <div class="door">
        <div class="door-face"></div>
        <div class="door-edge"></div>
        <div class="door-shadow"></div>
        <div class="door-name">CANARY</div>
        <div class="door-handle"></div>
      </div>
      <div class="frame"></div>
    </div>
    <div class="floor">
      <div class="floor-entry e1">Arts</div>
      <div class="floor-entry e2">Essays</div>
      <div class="floor-entry e3">Journal</div>
    </div>
  </div>
</body></html>
