<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050505; width: 1440px; height: 900px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; font-family: 'Space Mono', monospace; }
  .door-crack {
    width: 3px;
    height: 70%;
    background: #c4ff00;
    box-shadow: 0 0 30px rgba(196, 255, 0, 0.3), 0 0 80px rgba(196, 255, 0, 0.1);
    position: relative;
  }
  .door-crack::before, .door-crack::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 40px;
    background: linear-gradient(90deg, rgba(196, 255, 0, 0.02), transparent);
  }
  .door-crack::before { right: 100%; }
  .door-crack::after { left: 100%; background: linear-gradient(-90deg, rgba(196, 255, 0, 0.02), transparent); }
  .nav-bottom {
    position: absolute;
    bottom: 3rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3rem;
  }
  .nav-item {
    color: #3a3a3a;
    font-size: 0.6875rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.3s;
  }
  .nav-item:hover { color: #888; }
  .nav-item span { font-size: 0.5rem; margin-right: 0.5rem; }
  .hint {
    position: absolute;
    top: 3rem;
    right: 3rem;
    color: #2a2a2a;
    font-size: 0.5rem;
    letter-spacing: 0.2em;
  }
  .sys {
    position: absolute;
    top: 3rem;
    left: 3rem;
    color: #2a2a2a;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
  }
  .sys .dot { color: #c4ff00; animation: pulse 3s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head><body>
  <div class="sys"><span class="dot">●</span> SYS.ONLINE</div>
  <div class="hint">CANARY · 守門人記錄</div>
  <div class="door-crack"></div>
  <div class="nav-bottom">
    <div class="nav-item"><span>01</span>JOURNAL</div>
    <div class="nav-item"><span>02</span>ESSAYS</div>
    <div class="nav-item"><span>03</span>ARTS</div>
  </div>
</body></html>
