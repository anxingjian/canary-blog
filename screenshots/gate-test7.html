<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; width: 1440px; height: 900px; overflow: hidden; }
  .scene { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -45%);
    display: flex; flex-direction: column; align-items: center; }
  .door-frame { position: relative; width: 260px; height: 460px; }
  .light { position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.35) 50%, rgba(255,255,255,0.45) 100%); }
  .door { position: absolute; inset: 0; z-index: 3;
    transform-origin: left center; transform: perspective(800px) rotateY(12deg);
    backface-visibility: hidden; background: #0a0a0a; }

  .proj-outer { width: 500px; height: 220px; }
  .proj { width: 100%; height: 100%;
    clip-path: polygon(24% 0%, 76% 0%, 100% 100%, 0% 100%);
    background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.25) 40%, rgba(255,255,255,0.08) 75%, transparent 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 0.8rem 0; gap: 0;
  }

  /* Individual perspective per word */
  .e0 { font-family: 'Instrument Serif', serif; font-size: 1.8rem; color: rgba(30,30,30,0.65);
    transform: perspective(400px) rotateX(5deg); transform-origin: center top; }
  .e1 { font-family: 'Instrument Serif', serif; font-size: 2.2rem; color: rgba(30,30,30,0.7);
    transform: perspective(300px) rotateX(8deg); transform-origin: center top; margin-top: -0.15rem; }
  .e2 { font-family: 'Instrument Serif', serif; font-size: 3rem; color: rgba(30,30,30,0.75);
    transform: perspective(250px) rotateX(12deg); transform-origin: center top; margin-top: -0.15rem; }

  /* Comparison: stronger values */
  .strong .e0 { transform: perspective(200px) rotateX(15deg); }
  .strong .e1 { transform: perspective(150px) rotateX(22deg); }
  .strong .e2 { transform: perspective(100px) rotateX(30deg); }
</style>
</head>
<body>
  <!-- Current values (left) -->
  <div style="position:absolute; left:200px; top:50px; color:#555; font-family:monospace; font-size:12px;">Current: 400/5, 300/8, 250/12</div>
  <div style="position:absolute; left:200px; top:100px;">
    <div class="proj" style="width:500px;height:220px;clip-path:polygon(24% 0%, 76% 0%, 100% 100%, 0% 100%);background:linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.08) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div class="e0">Arts</div>
      <div class="e1">Essays</div>
      <div class="e2">Journal</div>
    </div>
  </div>

  <!-- Stronger values (right) -->
  <div style="position:absolute; left:800px; top:50px; color:#555; font-family:monospace; font-size:12px;">Stronger: 200/15, 150/22, 100/30</div>
  <div class="strong" style="position:absolute; left:800px; top:100px;">
    <div class="proj" style="width:500px;height:220px;clip-path:polygon(24% 0%, 76% 0%, 100% 100%, 0% 100%);background:linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.08) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div class="e0">Arts</div>
      <div class="e1">Essays</div>
      <div class="e2">Journal</div>
    </div>
  </div>
</body></html>
