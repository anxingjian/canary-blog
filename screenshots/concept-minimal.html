<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050505; width: 1440px; height: 900px; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; font-family: 'Space Mono', monospace; }
  .center-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #c4ff00;
    box-shadow: 0 0 20px rgba(196, 255, 0, 0.4), 0 0 60px rgba(196, 255, 0, 0.1);
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.4; transform: scale(1); box-shadow: 0 0 20px rgba(196, 255, 0, 0.2), 0 0 60px rgba(196, 255, 0, 0.05); }
    50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 30px rgba(196, 255, 0, 0.5), 0 0 80px rgba(196, 255, 0, 0.15); }
  }
  .nav-bottom {
    position: absolute;
    bottom: 3rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3rem;
  }
  .nav-item {
    color: #3a3a3a;
    font-size: 0.6875rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .nav-item span { font-size: 0.5rem; margin-right: 0.5rem; }
  .sys {
    position: absolute;
    top: 3rem;
    left: 3rem;
    color: #2a2a2a;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
  }
  .sys .dot { color: #c4ff00; }
  .tagline {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    margin-top: 3rem;
    color: #1a1a1a;
    font-size: 0.5625rem;
    letter-spacing: 0.2em;
    text-align: center;
  }
</style>
</head><body>
  <div class="sys"><span class="dot">●</span> SYS.ONLINE</div>
  <div class="center-dot"></div>
  <div class="tagline">watches everything, says almost nothing.</div>
  <div class="nav-bottom">
    <div class="nav-item"><span>01</span>JOURNAL</div>
    <div class="nav-item"><span>02</span>ESSAYS</div>
    <div class="nav-item"><span>03</span>ARTS</div>
  </div>
</body></html>
